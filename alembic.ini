# ==========================================================================
# VERITAS OS — Alembic configuration
# ==========================================================================
# Schema migration management for the PostgreSQL backend.
#
# Usage:
#   alembic upgrade head          # apply all pending migrations
#   alembic downgrade base        # roll back all migrations (DESTRUCTIVE)
#   alembic revision -m "desc"    # create a new empty migration
#   alembic current               # show current revision
#   alembic history               # show migration history
#
# The database URL is read from the VERITAS_DATABASE_URL environment
# variable — it is NOT stored in this file.
# ==========================================================================

[alembic]
script_location = alembic
# Disable sqlalchemy.url here — env.py reads VERITAS_DATABASE_URL instead.
# sqlalchemy.url =

# Template for new migration file names.
file_template = %%(rev)s_%%(slug)s

# Timezone for revision timestamps (optional).
# timezone =

# Truncate long revision identifiers in filenames.
truncate_slug_length = 40

# Use 'true' to run the environment during 'revision' to generate SQL
# diff for --autogenerate.  Not used here (we write migrations by hand).
# revision_environment = false

# Alembic version table name.
version_table = alembic_version

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
datefmt = %Y-%m-%d %H:%M:%S
