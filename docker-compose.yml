services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: veritas-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      VERITAS_CORS_ALLOW_ORIGINS: ${VERITAS_CORS_ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
        reservations:
          cpus: "0.5"
          memory: 512m

  frontend:
    image: node:20.19.0-bookworm
    container_name: veritas-frontend
    restart: unless-stopped
    working_dir: /app
    command: >-
      sh -c "corepack enable && pnpm install --frozen-lockfile &&
      pnpm --filter frontend dev --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    environment:
      VERITAS_API_BASE_URL: ${VERITAS_API_BASE_URL:-http://backend:8000}
    volumes:
      - ./frontend:/app/frontend
      - ./packages:/app/packages
      - ./package.json:/app/package.json:ro
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml:ro
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml:ro
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
        reservations:
          cpus: "0.25"
          memory: 256m
