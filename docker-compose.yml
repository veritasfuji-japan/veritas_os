services:
  # ─────────────────────────────────────────────────────────────────
  # PostgreSQL — Pluggable storage backend for MemoryOS and TrustLog.
  #
  #   Dev/local:   Use as-is with default credentials below.
  #   Staging:     Override VERITAS_DB_USER/PASSWORD via .env or CI secrets.
  #   Prod:        Use a managed PostgreSQL service (RDS, Cloud SQL) instead
  #                of this container.  See docs/postgresql-production-guide.md.
  #
  #   Production checklist:
  #     - Set VERITAS_DB_SSLMODE=verify-full
  #     - Inject VERITAS_DATABASE_URL from external secret manager
  #     - Tune pool: VERITAS_DB_POOL_MIN_SIZE / MAX_SIZE
  #     - Run migrations before starting backend: make db-upgrade
  # ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-bookworm
    container_name: veritas-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${VERITAS_DB_USER:-veritas}
      POSTGRES_PASSWORD: ${VERITAS_DB_PASSWORD:-veritas}
      POSTGRES_DB: ${VERITAS_DB_NAME:-veritas}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${VERITAS_DB_USER:-veritas}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
        reservations:
          cpus: "0.25"
          memory: 128m

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: veritas-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      VERITAS_CORS_ALLOW_ORIGINS: ${VERITAS_CORS_ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      VERITAS_MEMORY_BACKEND: ${VERITAS_MEMORY_BACKEND:-postgresql}
      VERITAS_TRUSTLOG_BACKEND: ${VERITAS_TRUSTLOG_BACKEND:-postgresql}
      VERITAS_DATABASE_URL: ${VERITAS_DATABASE_URL:-postgresql://veritas:veritas@postgres:5432/veritas}
      VERITAS_DB_AUTO_MIGRATE: ${VERITAS_DB_AUTO_MIGRATE:-true}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
        reservations:
          cpus: "0.5"
          memory: 512m

  frontend:
    image: node:20.19.0-bookworm
    container_name: veritas-frontend
    restart: unless-stopped
    working_dir: /app
    command: >-
      sh -c "corepack enable && pnpm install --frozen-lockfile &&
      pnpm --filter frontend dev --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    environment:
      VERITAS_API_BASE_URL: ${VERITAS_API_BASE_URL:-http://backend:8000}
    volumes:
      - ./frontend:/app/frontend
      - ./packages:/app/packages
      - ./package.json:/app/package.json:ro
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml:ro
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml:ro
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
        reservations:
          cpus: "0.25"
          memory: 256m

volumes:
  pgdata:
