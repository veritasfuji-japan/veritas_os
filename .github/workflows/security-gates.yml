name: Security Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtime-guards:
    name: Runtime guardrails (pickle + bare except)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Enforce runtime pickle artifact ban
        run: python scripts/security/check_runtime_pickle_artifacts.py

      - name: Enforce bare except reduction gate
        run: python scripts/security/check_bare_except_usage.py

  dependency-audit:
    name: Dependency audit (Python + Node)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit==2.8.0

      - name: Python core production dependency audit (pip-audit, blocking)
        run: |
          # Temporary narrow exception:
          # - PYSEC-2026-161 is fixed in starlette>=1.0.1.
          # - fastapi==0.121.0 currently does not resolve with starlette==1.0.1.
          # - Do not broaden this ignore.
          # - To remove: confirm `pip install "fastapi>=X" "starlette>=1.0.1"`
          #   resolves without conflict, then delete --ignore-vuln PYSEC-2026-161
          #   from this file and from security-gates.yml (or main.yml).
          pip-audit -r veritas_os/requirements-core.txt --desc --ignore-vuln PYSEC-2026-161

      - name: Python full/optional dependency audit (pip-audit, informational)
        continue-on-error: true
        run: pip-audit -r veritas_os/requirements.txt --desc

      - name: Setup pnpm (Corepack)
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Node dependency audit (production dependencies, blocking)
        run: python scripts/ci/pnpm_audit_gate.py --audit-level=high --prod

      - name: Node dependency audit (all dependencies, informational)
        run: |
          set +e
          pnpm audit --audit-level=high
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "::warning::High vulnerabilities detected in non-production dependency tree (or npm audit endpoint instability)."
          fi
          exit 0

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ARGS: --no-banner --redact --verbose

  next-public-secret-guard:
    name: Guard NEXT_PUBLIC secret-like variables
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Block NEXT_PUBLIC_*KEY style exposures
        run: python scripts/security/check_next_public_key_exposure.py
