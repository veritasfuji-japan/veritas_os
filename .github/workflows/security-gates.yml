name: Security Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fork-pr-permission-notice:
    name: Fork PR permission notice
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Explain skip reason
        run: |
          echo "::warning::Security Gates jobs that require repository checkout are skipped for fork PRs due to GitHub token permission restrictions."
          echo "::warning::Security risk: skipping these checks lowers enforcement for untrusted forks; run full gates after maintainers branch the changes."

  dependency-audit:
    name: Dependency audit (Python + Node)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit==2.8.0

      - name: Python dependency audit (pip-audit)
        run: pip-audit -r veritas_os/requirements.txt

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Node dependency audit (production dependencies, blocking)
        run: pnpm audit --audit-level=high --prod

      - name: Node dependency audit (all dependencies, informational)
        run: |
          set +e
          pnpm audit --audit-level=high
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "::warning::High vulnerabilities detected in non-production dependency tree (likely tooling)."
          fi
          exit 0

  secret-scan:
    name: Secret scan (gitleaks)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ARGS: --no-banner --redact --verbose

  next-public-secret-guard:
    name: Guard NEXT_PUBLIC secret-like variables
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Block NEXT_PUBLIC_*KEY style exposures
        run: python scripts/security/check_next_public_key_exposure.py
