# ============================================================================
# VERITAS OS — CI (Tier 1 — every PR and push to main)
#
# Tier Model (see docs/en/validation/production-validation.md for full explanation):
#   Tier 1 — lint + governance-smoke   Fast gates, blocking on every PR (~5-8 min)
#   Tier 1 — dependency-audit          CVE scan, blocking on every PR
#   Tier 1 — test (py matrix)          Full unit tests + 85% coverage gate
#   Tier 1 — test-slow                 Heavy tests (parallel, non-blocking on matrix)
#   Tier 1 — frontend-quality-gate     Lint / unit / E2E
#   Tier 2 — release-gate.yml          Production validation, blocking on v* tags
#   Tier 3 — production-validation.yml Weekly/manual production-like validation
#
# Release path: push a v* tag → release-gate.yml automatically gates the release.
# ============================================================================

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  VERITAS_PIPELINE_VERSION: "${{ github.sha }}"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# ============================================================
# [Tier 1] Lint & Security (fast-fail — テストより先に回す)
# ============================================================
jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint tools
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install ruff==0.11.4 bandit==1.9.4

      - name: Ruff check (lint)
        run: ruff check veritas_os/

      - name: Responsibility boundary check
        run: python scripts/architecture/check_responsibility_boundaries.py --report-format json

      - name: Core complexity budget check
        run: python scripts/architecture/check_core_complexity_budget.py

      - name: Operational docs consistency check
        run: python scripts/quality/check_operational_docs_consistency.py

      - name: Frontend docs consistency check
        run: python scripts/quality/check_frontend_docs_consistency.py

      - name: Review improvements consistency check
        run: python scripts/quality/check_review_improvements_consistency.py

      - name: Evidence Bundle reviewer docs consistency check
        run: python scripts/quality/check_evidence_bundle_reviewer_docs.py

      - name: requirements.txt sync check
        run: python scripts/quality/check_requirements_sync.py

      - name: Install governance schema check runtime deps
        run: python -m pip install -r veritas_os/requirements-core.txt

      - name: Governance policy/schema sync check
        run: python scripts/quality/check_governance_policy_schema_sync.py

      - name: Memory directory allowlist check
        env:
          VERITAS_ENV: "production"
          VERITAS_MEMORY_DIR: "/tmp/veritas_memory_ci/runtime"
          VERITAS_MEMORY_DIR_ALLOWLIST: "/tmp/veritas_memory_ci"
          VERITAS_MEMORY_DIR_CHECK_REQUIRE_PRODUCTION: "1"
        run: python scripts/security/check_memory_dir_allowlist.py

      - name: httpx raw upload deprecation check
        run: python scripts/security/check_httpx_raw_upload_usage.py

      - name: subprocess shell usage check
        run: python scripts/security/check_subprocess_shell_usage.py

      - name: unsafe dynamic execution/deserialization check
        run: python scripts/security/check_unsafe_dynamic_execution_usage.py

      - name: Prepare deterministic replay report fixture
        run: |
          mkdir -p audit/replay_reports
          cat > audit/replay_reports/replay_ci_fixture.json <<'JSON'
          {
            "meta": {
              "pipeline_version": "ci-fixture-v1"
            }
          }
          JSON

      - name: replay pipeline-version unknown-rate check
        run: |
          python scripts/quality/check_replay_pipeline_version_unknown_rate.py \
            --max-unknown-rate 0.0 \
            --require-reports

      - name: deployment env template smoke check
        run: python scripts/quality/check_deployment_env_defaults.py

      - name: runtime pickle artifact check
        run: python scripts/security/check_runtime_pickle_artifacts.py

      - name: bare except usage check
        run: python scripts/security/check_bare_except_usage.py

      - name: Bandit security scan
        run: |
          bandit -r veritas_os/ \
            --exclude veritas_os/tests \
            -s B101 \
            --severity-level medium \
            -f txt



  dependency-audit:
    name: dependency-audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install pip-audit==2.8.0

      - name: Block high/critical CVEs in Python core production dependencies
        run: |
          # Temporary narrow exception:
          # - PYSEC-2026-161 is fixed in starlette>=1.0.1.
          # - fastapi==0.121.0 currently does not resolve with starlette==1.0.1.
          # - Do not broaden this ignore.
          # - To remove: confirm `pip install "fastapi>=X" "starlette>=1.0.1"`
          #   resolves without conflict, then delete --ignore-vuln PYSEC-2026-161
          #   from this file and from security-gates.yml (or main.yml).
          pip-audit -r veritas_os/requirements-core.txt --desc --ignore-vuln PYSEC-2026-161

      - name: Python full/optional dependency audit (informational)
        continue-on-error: true
        run: pip-audit -r veritas_os/requirements.txt --desc

      - name: Setup pnpm (Corepack)
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit (production-only)
        run: python scripts/ci/pnpm_audit_gate.py --audit-level=high --prod

  # ============================================================
  # [Tier 1] Governance Smoke (fast ~2 min — blocking on PRs)
  # Explicit smoke gate that runs in parallel with lint/dependency-audit.
  # Smoke tests exercise health endpoints, config structure, and governance
  # invariants without requiring live LLM calls.
  # ============================================================
  governance-smoke:
    name: "[Tier 1] governance-smoke"
    runs-on: ubuntu-latest
    timeout-minutes: 8

    env:
      PYTHONUNBUFFERED: "1"
      OPENAI_API_KEY: "DUMMY_FOR_CI"
      VERITAS_API_KEY: "DUMMY_FOR_CI"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r veritas_os/requirements.txt

      - name: "[Tier 1] Check bind coverage evidence freshness"
        run: python -m scripts.governance.check_bind_coverage_evidence_freshness

      - name: "[Tier 1] Check performance evidence freshness"
        run: make check-performance-evidence

      - name: "[Tier 1] Check TrustLog production posture"
        env:
          VERITAS_REQUIRE_PRODUCTION_TRUSTLOG_POSTURE: "1"
          VERITAS_ENV: "production"
          VERITAS_TRUSTLOG_BACKEND: "postgresql"
          VERITAS_DATABASE_URL: "postgresql://veritas:veritas@localhost:5432/veritas_ci"
          VERITAS_ENCRYPTION_KEY: "ci-dummy-encryption-key-not-a-real-secret"
          VERITAS_TRUSTLOG_SIGNER_BACKEND: "aws_kms"
          VERITAS_TRUSTLOG_KMS_KEY_ID: "arn:aws:kms:us-east-1:000000000000:key/ci-dummy"
          VERITAS_TRUSTLOG_WORM_MIRROR_PATH: "/tmp/veritas-ci/worm"
          VERITAS_TRUSTLOG_TRANSPARENCY_REQUIRED: "1"
          VERITAS_TRUSTLOG_TRANSPARENCY_LOG_PATH: "/tmp/veritas-ci/transparency.jsonl"
        run: make check-trustlog-production-posture

      - name: "[Tier 1] Run governance smoke tests"
        run: |
          set -euxo pipefail
          mkdir -p test-reports
          pytest -q veritas_os/tests/ \
            -m smoke \
            -v \
            --tb=short \
            --durations=10 \
            --junitxml=test-reports/smoke.xml

      - name: "[Tier 1] Guard governance policy against test mutation"
        run: git diff --exit-code -- veritas_os/api/governance.json

      - name: Upload smoke test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report-${{ github.run_id }}
          path: test-reports/smoke.xml
          if-no-files-found: warn

  # ============================================================
  # [Tier 1] Governance backend invariants (fast)
  # Explicit gate for backend selection, rollback approvals,
  # invalid backend fail-fast, and concurrent audit safety.
  # ============================================================
  governance-backend-fast:
    name: "[Tier 1] governance-backend-fast"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      PYTHONUNBUFFERED: "1"
      OPENAI_API_KEY: "DUMMY_FOR_CI"
      VERITAS_API_KEY: "DUMMY_FOR_CI"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r veritas_os/requirements.txt

      - name: "[Tier 1] Verify YAML dependency from declared requirements"
        run: |
          set -euxo pipefail
          python - <<'PY'
          from importlib.metadata import version
          from pathlib import Path

          requirements = Path("veritas_os/requirements.txt").read_text()
          expected = None

          for line in requirements.splitlines():
              normalized = line.strip()
              if normalized.lower().startswith("pyyaml=="):
                  expected = normalized.split("==", 1)[1]
                  break

          if expected is None:
              raise SystemExit("PyYAML pin not found in veritas_os/requirements.txt")

          resolved = version("PyYAML")

          if resolved != expected:
              raise SystemExit(f"Expected PyYAML=={expected}, got {resolved}")

          import yaml
          print(f"PyYAML resolved and importable: {resolved}")
          PY

      - name: "[Tier 1] Run fast governance backend invariant tests"
        run: |
          set -euxo pipefail
          mkdir -p test-reports
          pytest -q \
            veritas_os/tests/test_governance_backend_selection.py \
            veritas_os/tests/test_governance_repository.py \
            veritas_os/tests/test_governance_artifact_signing.py::TestGovernedRollback \
            veritas_os/tests/test_governance_artifact_signing.py::TestGovernanceHistoryDigests \
            tests/governance/test_rsa_sandbox_receiver.py \
            tests/governance/test_rsa_veritas_e2e_harness.py \
            --tb=short \
            --durations=20 \
            --junitxml=test-reports/governance-backend-fast.xml

      - name: Upload governance backend fast test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-backend-fast-report-${{ github.run_id }}
          path: test-reports/governance-backend-fast.xml
          if-no-files-found: warn

  # Experimental non-blocking compatibility check.
  # This job does not change pinned production dependencies.
  # It previews future FastAPI/Pydantic upgrade risk in CI logs.
  future-dependency-compat:
    name: future-dependency-compat
    runs-on: ubuntu-latest
    timeout-minutes: 12
    continue-on-error: true

    env:
      PYTHONUNBUFFERED: "1"
      OPENAI_API_KEY: "DUMMY_FOR_CI"
      VERITAS_API_KEY: "DUMMY_FOR_CI"
      VERITAS_PIPELINE_VERSION: "${{ github.sha }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install base dependencies and dry-run upgrades
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r veritas_os/requirements.txt
          python -m pip install --upgrade "fastapi>=0.121,<0.123" "pydantic>=2.10,<2.12"

      - name: Print resolved dependency versions
        run: |
          set -euxo pipefail
          python - <<'PY' | tee future-dependency-versions.txt
          import fastapi
          import pydantic
          import starlette

          print(f"fastapi {fastapi.__version__}")
          print(f"pydantic {pydantic.__version__}")
          print(f"starlette {starlette.__version__}")
          PY
          python -m pip check

      - name: Run targeted compatibility smoke tests
        run: |
          set -uo pipefail
          status=0
          pytest -q \
            veritas_os/tests/test_openapi_no_deprecation_warnings.py \
            veritas_os/tests/test_openapi_spec.py \
            veritas_os/tests/test_openapi_pre_bind_contract.py \
            veritas_os/tests/test_schemas_extra.py \
            veritas_os/tests/test_schemas_extra_v2.py \
            veritas_os/tests/test_decide_e2e_reliability.py \
            --tb=short \
            -W error::DeprecationWarning || status=$?

          if [ "$status" -eq 0 ]; then
            echo "passed" > future-dependency-pytest-result.txt
            echo "0" > future-dependency-pytest-exit-code.txt
          else
            echo "failed" > future-dependency-pytest-result.txt
            echo "$status" > future-dependency-pytest-exit-code.txt
          fi

          exit "$status"

      - name: Write compatibility summary
        if: always()
        run: |
          {
            echo "## Future dependency compatibility dry-run"
            echo ""
            echo "Status: experimental / non-blocking"
            echo ""
            echo "### Production pins"
            echo "Production dependency manifests were not changed by this job."
            echo "This job installs \`veritas_os/requirements.txt\` first, then upgrades selected packages only inside the CI job."
            echo ""
            echo "### Dry-run ranges"
            echo "- fastapi: \`>=0.121,<0.123\`"
            echo "- pydantic: \`>=2.10,<2.12\`"
            echo ""
            echo "### Resolved versions"
            echo "\`\`\`text"
            if [ -f future-dependency-versions.txt ]; then
              cat future-dependency-versions.txt
            else
              echo "Resolved versions were not captured; dependency install may have failed."
            fi
            echo "\`\`\`"
            echo ""
            echo "### Test result"
            if [ -f future-dependency-pytest-result.txt ]; then
              result="$(cat future-dependency-pytest-result.txt)"
            else
              result="unknown"
            fi
            if [ -f future-dependency-pytest-exit-code.txt ]; then
              exit_code="$(cat future-dependency-pytest-exit-code.txt)"
            else
              exit_code="unavailable"
            fi
            echo "Result: \`$result\`"
            echo "Exit code: \`$exit_code\`"
            if [ "$result" = "unknown" ]; then
              echo ""
              echo "The pytest result file was not captured; dependency install or earlier setup may have failed."
            elif [ "$result" != "passed" ]; then
              echo ""
              echo "Review the job log for failing tests and dependency resolver output."
            fi
            echo ""
            echo "### Targeted tests"
            echo "- \`veritas_os/tests/test_openapi_no_deprecation_warnings.py\`"
            echo "- \`veritas_os/tests/test_openapi_spec.py\`"
            echo "- \`veritas_os/tests/test_openapi_pre_bind_contract.py\`"
            echo "- \`veritas_os/tests/test_schemas_extra.py\`"
            echo "- \`veritas_os/tests/test_schemas_extra_v2.py\`"
            echo "- \`veritas_os/tests/test_decide_e2e_reliability.py\`"
            echo ""
            echo "### Interpretation"
            echo "A failure in this job indicates possible future FastAPI/Pydantic upgrade risk."
            echo "It does not mean the pinned production dependencies are broken."
            echo "This job is intentionally \`continue-on-error: true\` until the compatibility lane is stable."
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================
  # [Tier 1] Test matrix
  # ============================================================
  test:
    name: test (py${{ matrix.python-version }})
    needs: [lint, dependency-audit, governance-smoke, governance-backend-fast]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_PYTHON_VERSION_WARNING: "1"
      OPENAI_API_KEY: "DUMMY_FOR_CI"
      VERITAS_API_KEY: "DUMMY_FOR_CI"
      COVERAGE_FAIL_UNDER: "85"
      PYTEST_MARKEXPR: "not slow"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          set -euxo pipefail
          pip_retry() {
            local cmd="$1"
            local attempts=3
            local delay=5
            local try=1
            until [ "${try}" -gt "${attempts}" ]; do
              if eval "${cmd}"; then
                return 0
              fi
              if [ "${try}" -lt "${attempts}" ]; then
                echo "pip command failed (attempt ${try}/${attempts}), retrying in ${delay}s..."
                sleep "${delay}"
              fi
              try=$((try + 1))
            done
            echo "pip command failed after ${attempts} attempts: ${cmd}"
            return 1
          }

          pip_retry "python -m pip install --upgrade pip --retries 5 --timeout 60"

          # プロジェクト依存をインストール
          pip_retry "python -m pip install --retries 5 --timeout 60 -r veritas_os/requirements.txt"

          # テスト用追加パッケージ
          pip_retry "python -m pip install --retries 5 --timeout 60 \
            httpx \
            anyio \
            pytest \
            pytest-cov \
            pytest-asyncio"

      - name: Run tests (with coverage)
        id: pytest
        run: |
          set -euxo pipefail
          mkdir -p test-reports coverage-html

          # Full Python test discovery roots are explicit to avoid skipping
          # either repository-level tests/ or package-level veritas_os/tests/.
          pytest -q veritas_os/tests tests \
            --cov=veritas_os \
            --cov-config=veritas_os/tests/.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:coverage-html \
            --cov-fail-under=${COVERAGE_FAIL_UNDER} \
            -m "${PYTEST_MARKEXPR}" \
            --durations=20 \
            --junitxml=test-reports/pytest.xml \
            --tb=short

      - name: Upload test report (junit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.python-version }}
          path: test-reports/pytest.xml
          if-no-files-found: warn

      - name: Upload coverage (xml + html)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: |
            coverage.xml
            coverage-html
          if-no-files-found: warn

      # Removed: "Fail job if tests failed" guard — pytest step now fails
      # the job directly (continue-on-error removed).


  # ============================================================
  # [Tier 1] PostgreSQL backend parity tests
  #
  # Validates that JSONL ↔ PostgreSQL backends are interchangeable
  # by running the backend contract and parity matrix tests against
  # a real PostgreSQL service container.
  #
  # This job also runs the real-PostgreSQL advisory-lock contention
  # tests (pytest -m "postgresql and contention") that prove the
  # advisory-lock serialisation actually works on a live database —
  # something the mock-pool tests above can only approximate.
  # ============================================================
  test-postgresql:
    name: test-postgresql (py3.12)
    needs: [lint, dependency-audit, governance-smoke, governance-backend-fast]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: veritas
          POSTGRES_PASSWORD: veritas_test
          POSTGRES_DB: veritas_test
        options: >-
          --health-cmd "pg_isready -U veritas"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_PYTHON_VERSION_WARNING: "1"
      OPENAI_API_KEY: "DUMMY_FOR_CI"
      VERITAS_API_KEY: "DUMMY_FOR_CI"
      VERITAS_DATABASE_URL: "postgresql+psycopg://veritas:veritas_test@localhost:5432/veritas_test"
      VERITAS_MEMORY_BACKEND: "postgresql"
      VERITAS_TRUSTLOG_BACKEND: "postgresql"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          set -euxo pipefail
          pip_retry() {
            local cmd="$1"
            local attempts="${2:-4}"
            local delay="${3:-8}"
            local try=1
            until eval "$cmd"; do
              if [ "$try" -ge "$attempts" ]; then
                echo "pip command failed after ${attempts} attempts: ${cmd}"
                return 1
              fi
              echo "pip command failed (attempt ${try}/${attempts}), retrying in ${delay}s..."
              sleep "$delay"
              try=$((try + 1))
            done
          }

          pip_retry "python -m pip install --upgrade pip --retries 5 --timeout 60"
          pip_retry "python -m pip install --retries 5 --timeout 60 -r veritas_os/requirements.txt"
          pip_retry "python -m pip install --retries 5 --timeout 60 \"psycopg[binary]\" psycopg-pool"
          pip_retry "python -m pip install --retries 5 --timeout 60 httpx anyio pytest pytest-cov pytest-asyncio"

      - name: Run Alembic migrations
        run: |
          set -euxo pipefail
          python -m pip install --retries 5 --timeout 60 alembic
          alembic upgrade head
        env:
          VERITAS_DATABASE_URL: "postgresql+psycopg://veritas:veritas_test@localhost:5432/veritas_test"

      - name: Run backend parity tests (mock-pool)
        # Excludes the real-PG contention tests (postgresql and contention)
        # so they get their own step with dedicated JUnit output and
        # clearer failure attribution.  See "Run real PostgreSQL contention
        # tests" step below for the high-fidelity advisory-lock tests.
        run: |
          set -euxo pipefail
          mkdir -p test-reports
          pytest -q \
            veritas_os/tests/test_storage_backend_contract.py \
            veritas_os/tests/test_storage_backend_parity_matrix.py \
            veritas_os/tests/test_storage_postgresql_memory.py \
            veritas_os/tests/test_storage_postgresql_trustlog.py \
            veritas_os/tests/test_pg_trustlog_contention.py \
            veritas_os/tests/test_storage_factory.py \
            veritas_os/tests/test_storage_base.py \
            veritas_os/tests/test_storage_db.py \
            -m "not (postgresql and contention)" \
            --tb=short \
            --junitxml=test-reports/postgresql-parity.xml

      - name: Run real PostgreSQL contention tests
        # These tests prove that PostgreSQL's own pg_advisory_xact_lock
        # actually serialises TrustLog writes — something mock-pool tests
        # can only approximate.  Failure here indicates a real advisory-lock
        # integrity regression, not a mock-setup issue.
        #
        # Diagnosis:
        #   advisory lock failure   → check advisory lock key (0x5645524954415301)
        #   statement/lock timeout  → check DB under load; increase test margin
        #   chain verification fail → INSERT + UPDATE not in same transaction
        #   duplicate/gap           → UNIQUE constraint or advisory lock broken
        run: |
          set -euxo pipefail
          mkdir -p test-reports
          pytest -q \
            veritas_os/tests/test_pg_trustlog_contention.py \
            -m "postgresql and contention" \
            -v \
            --tb=short \
            --durations=10 \
            --junitxml=test-reports/postgresql-contention.xml

      - name: Upload PostgreSQL parity test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postgresql-parity-report-${{ github.run_id }}
          path: test-reports/postgresql-parity.xml
          if-no-files-found: warn

      - name: Upload PostgreSQL contention test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postgresql-contention-report-${{ github.run_id }}
          path: test-reports/postgresql-contention.xml
          if-no-files-found: warn


  test-slow:
    name: test-slow (py3.12)
    needs: [lint, dependency-audit, governance-smoke, governance-backend-fast]
    runs-on: ubuntu-latest
    # test-slow installs the full requirements.txt which includes heavy optional
    # ML wheels (e.g. torch, torchvision). On a cold runner cache these can take
    # 8-12 minutes to install before pytest even starts. The 20-minute ceiling
    # provides headroom without masking genuine test hangs; do not reduce below
    # 15 minutes without first verifying that the full wheel install completes
    # within the new limit on a cache-miss run.
    timeout-minutes: 20

    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_PYTHON_VERSION_WARNING: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          set -euxo pipefail
          pip_retry() {
            local cmd="$1"
            local max_attempts=3
            local attempt=1
            local delay=2

            until bash -lc "$cmd"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Command failed after ${max_attempts} attempts: $cmd" >&2
                return 1
              fi
              echo "Attempt ${attempt}/${max_attempts} failed. Retrying in ${delay}s..." >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          pip_retry "python -m pip install --upgrade pip --retries 5 --timeout 60"
          pip_retry "python -m pip install --retries 5 --timeout 60 -r veritas_os/requirements.txt"
          pip_retry "python -m pip install --retries 5 --timeout 60 pytest"

      - name: Run slow tests (if any)
        run: |
          set -euxo pipefail
          status=0
          pytest -q veritas_os/tests -m slow --durations=20 --tb=short || status=$?
          if [ "$status" -eq 5 ]; then
            echo "No slow tests were selected."
            exit 0
          fi
          exit "$status"

  # ============================================================
  # [Tier 1] Frontend quality gates: lint/test/e2e を Python 側同様に matrix 化
  # ============================================================
  frontend-quality-gate:
    name: frontend-${{ matrix.gate }}
    needs: [lint, dependency-audit, governance-smoke, governance-backend-fast]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        gate: ["lint", "test", "e2e"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard against NEXT_PUBLIC_*KEY exposure
        run: |
          set -euo pipefail
          if command -v rg &>/dev/null; then
            FOUND=$(rg -n "NEXT_PUBLIC_[A-Z0-9_]*KEY" frontend --glob '!**/*.md' || true)
          else
            FOUND=$(grep -rn "NEXT_PUBLIC_[A-Z0-9_]*KEY" frontend --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' || true)
          fi
          if [ -n "$FOUND" ]; then
            echo "$FOUND"
            echo "Detected forbidden NEXT_PUBLIC_*KEY usage in frontend source." >&2
            exit 1
          fi

      - name: Setup pnpm (Corepack)
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        if: matrix.gate == 'e2e'
        working-directory: frontend
        run: |
          set -euo pipefail
          # Avoid --with-deps: apt mirror stalls can cancel the e2e job.
          pnpm exec playwright install chromium chromium-headless-shell

      - name: Build frontend
        if: matrix.gate == 'e2e'
        run: pnpm ui:build

      - name: Verify build output
        if: matrix.gate == 'e2e'
        run: test -f frontend/.next/BUILD_ID && echo "Build OK"

      - name: Run frontend quality gate (${{ matrix.gate }})
        id: frontend_gate
        working-directory: frontend
        run: |
          set -euxo pipefail
          case "${{ matrix.gate }}" in
            lint)
              pnpm lint
              ;;
            test)
              pnpm test
              ;;
            e2e)
              pnpm e2e
              ;;
            *)
              echo "Unknown gate: ${{ matrix.gate }}" >&2
              exit 1
              ;;
          esac

      - name: Upload Playwright artifacts on failure
        if: failure() && matrix.gate == 'e2e'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: warn
