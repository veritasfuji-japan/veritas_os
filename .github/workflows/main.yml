name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  VERITAS_PIPELINE_VERSION: "${{ github.sha }}"

# ============================================================
# Lint & Security (fast-fail — テストより先に回す)
# ============================================================
jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint tools
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install ruff==0.11.4 bandit==1.9.4

      - name: Ruff check (lint)
        run: ruff check veritas_os/

      - name: Responsibility boundary check
        run: python scripts/architecture/check_responsibility_boundaries.py --report-format json

      - name: Core complexity budget check
        run: python scripts/architecture/check_core_complexity_budget.py

      - name: Operational docs consistency check
        run: python scripts/quality/check_operational_docs_consistency.py

      - name: Frontend docs consistency check
        run: python scripts/quality/check_frontend_docs_consistency.py

      - name: Memory directory allowlist check
        env:
          VERITAS_ENV: "production"
          VERITAS_MEMORY_DIR: "/tmp/veritas_memory_ci/runtime"
          VERITAS_MEMORY_DIR_ALLOWLIST: "/tmp/veritas_memory_ci"
          VERITAS_MEMORY_DIR_CHECK_REQUIRE_PRODUCTION: "1"
        run: python scripts/security/check_memory_dir_allowlist.py

      - name: httpx raw upload deprecation check
        run: python scripts/security/check_httpx_raw_upload_usage.py

      - name: subprocess shell usage check
        run: python scripts/security/check_subprocess_shell_usage.py

      - name: unsafe dynamic execution/deserialization check
        run: python scripts/security/check_unsafe_dynamic_execution_usage.py

      - name: replay pipeline-version unknown-rate check
        run: |
          python scripts/quality/check_replay_pipeline_version_unknown_rate.py \
            --max-unknown-rate 0.0

      - name: deployment env template smoke check
        run: python scripts/quality/check_deployment_env_defaults.py

      - name: runtime pickle artifact check
        run: python scripts/security/check_runtime_pickle_artifacts.py

      - name: Bandit security scan
        run: |
          bandit -r veritas_os/ \
            --exclude veritas_os/tests \
            -s B101 \
            --severity-level medium \
            -f txt



  dependency-audit:
    name: dependency-audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install pip-audit==2.8.0

      - name: Block high/critical CVEs in Python dependencies
        run: pip-audit -r veritas_os/requirements.txt --desc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit (production-only)
        run: pnpm audit --audit-level=high --prod

  # ============================================================
  # Test matrix
  # ============================================================
  test:
    name: test (py${{ matrix.python-version }})
    needs: [lint, dependency-audit]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_PYTHON_VERSION_WARNING: "1"
      OPENAI_API_KEY: "DUMMY_FOR_CI"
      VERITAS_API_KEY: "DUMMY_FOR_CI"
      COVERAGE_FAIL_UNDER: "85"
      PYTEST_MARKEXPR: "not slow"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip

          # プロジェクト依存をインストール
          python -m pip install -r veritas_os/requirements.txt

          # テスト用追加パッケージ
          python -m pip install \
            httpx \
            anyio \
            pytest \
            pytest-cov \
            pytest-asyncio

      - name: Run tests (with coverage)
        id: pytest
        continue-on-error: true
        run: |
          set -euxo pipefail
          mkdir -p test-reports coverage-html

          pytest -q veritas_os/tests \
            --cov=veritas_os \
            --cov-config=veritas_os/tests/.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:coverage-html \
            --cov-fail-under=${COVERAGE_FAIL_UNDER} \
            -m "${PYTEST_MARKEXPR}" \
            --durations=20 \
            --junitxml=test-reports/pytest.xml \
            --tb=short

      - name: Upload test report (junit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.python-version }}
          path: test-reports/pytest.xml
          if-no-files-found: warn

      - name: Upload coverage (xml + html)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: |
            coverage.xml
            coverage-html
          if-no-files-found: warn

      - name: Fail job if tests failed
        if: steps.pytest.outcome == 'failure'
        run: exit 1


  test-slow:
    name: test-slow (py3.12)
    needs: [lint, dependency-audit]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_PYTHON_VERSION_WARNING: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r veritas_os/requirements.txt
          python -m pip install pytest

      - name: Run slow tests (if any)
        run: |
          set -euxo pipefail
          status=0
          pytest -q veritas_os/tests -m slow --durations=20 --tb=short || status=$?
          if [ "$status" -eq 5 ]; then
            echo "No slow tests were selected."
            exit 0
          fi
          exit "$status"

  # ============================================================
  # Frontend quality gates: lint/test/e2e を Python 側同様に matrix 化
  # ============================================================
  frontend-quality-gate:
    name: frontend-${{ matrix.gate }}
    needs: [lint, dependency-audit]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        gate: ["lint", "test", "e2e"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard against NEXT_PUBLIC_*KEY exposure
        run: |
          set -euo pipefail
          if rg -n "NEXT_PUBLIC_[A-Z0-9_]*KEY" frontend --glob '!**/*.md'; then
            echo "Detected forbidden NEXT_PUBLIC_*KEY usage in frontend source." >&2
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        if: matrix.gate == 'e2e'
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium chromium-headless-shell

      - name: Build frontend
        if: matrix.gate == 'e2e'
        run: pnpm ui:build

      - name: Verify build output
        if: matrix.gate == 'e2e'
        run: test -f frontend/.next/BUILD_ID && echo "Build OK"

      - name: Run frontend quality gate (${{ matrix.gate }})
        id: frontend_gate
        working-directory: frontend
        run: |
          set -euxo pipefail
          case "${{ matrix.gate }}" in
            lint)
              pnpm lint
              ;;
            test)
              pnpm test
              ;;
            e2e)
              pnpm e2e
              ;;
            *)
              echo "Unknown gate: ${{ matrix.gate }}" >&2
              exit 1
              ;;
          esac

      - name: Upload Playwright artifacts on failure
        if: failure() && matrix.gate == 'e2e'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: warn
