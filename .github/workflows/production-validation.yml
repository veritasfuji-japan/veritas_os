# ============================================================================
# VERITAS OS — Production Validation CI Workflow
#
# Runs production-like tests in isolation from the main CI pipeline.
# Triggered manually (workflow_dispatch) or on a weekly schedule.
# Does NOT block normal PRs.
# ============================================================================

name: Production Validation

on:
  workflow_dispatch:
    inputs:
      include_docker:
        description: "Run Docker Compose smoke test"
        type: boolean
        default: false
      include_external:
        description: "Run external API tests (requires secrets)"
        type: boolean
        default: false
  schedule:
    # Weekly on Sundays at 04:00 UTC
    - cron: "0 4 * * 0"

concurrency:
  group: production-validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  VERITAS_PIPELINE_VERSION: "${{ github.sha }}"

jobs:
  # ── Production-like Python tests ──────────────────────────────────────
  production-tests:
    name: production-tests (py3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      PYTHONUNBUFFERED: "1"
      OPENAI_API_KEY: "DUMMY_FOR_CI"
      VERITAS_API_KEY: "DUMMY_FOR_CI"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r veritas_os/requirements.txt
          python -m pip install pytest pytest-cov httpx anyio

      - name: Enforce runtime pickle artifact ban
        run: python scripts/security/check_runtime_pickle_artifacts.py

      - name: Enforce bare except reduction gate
        run: python scripts/security/check_bare_except_usage.py

      - name: Run production-like tests
        run: |
          set -euxo pipefail
          pytest -q veritas_os/tests/ \
            -m "production or smoke" \
            -v \
            --tb=short \
            --durations=20 \
            --junitxml=test-reports/production.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-test-report
          path: test-reports/production.xml
          if-no-files-found: warn

  # ── Tier 3 governance backend deep validation ─────────────────────────
  governance-backend-longrun:
    name: governance-backend-longrun
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: veritas
          POSTGRES_PASSWORD: veritas_test
          POSTGRES_DB: veritas_test
        options: >-
          --health-cmd "pg_isready -U veritas"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      PYTHONUNBUFFERED: "1"
      OPENAI_API_KEY: "DUMMY_FOR_CI"
      VERITAS_API_KEY: "DUMMY_FOR_CI"
      VERITAS_DATABASE_URL: "postgresql+psycopg://veritas:veritas_test@localhost:5432/veritas_test"
      VERITAS_GOVERNANCE_BACKEND: "postgresql"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r veritas_os/requirements.txt
          python -m pip install "psycopg[binary]" psycopg-pool alembic pytest httpx anyio

      - name: Run Alembic migrations
        run: |
          set -euxo pipefail
          alembic upgrade head

      - name: Run Tier 3 governance backend deep tests
        run: |
          set -euxo pipefail
          mkdir -p test-reports
          pytest -q \
            veritas_os/tests/test_governance_backend_selection.py \
            veritas_os/tests/test_governance_postgresql_repository.py \
            veritas_os/tests/test_governance_artifact_signing.py \
            veritas_os/tests/test_production_governance.py \
            --tb=short \
            --durations=30 \
            --junitxml=test-reports/governance-backend-longrun.xml

      - name: Upload governance backend longrun report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-backend-longrun-report
          path: test-reports/governance-backend-longrun.xml
          if-no-files-found: warn

  # ── PostgreSQL backend smoke test ────────────────────────────────────
  postgresql-smoke:
    name: postgresql-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: veritas
          POSTGRES_PASSWORD: veritas_test
          POSTGRES_DB: veritas_test
        options: >-
          --health-cmd "pg_isready -U veritas"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      PYTHONUNBUFFERED: "1"
      OPENAI_API_KEY: "DUMMY_FOR_CI"
      VERITAS_API_KEY: "DUMMY_FOR_CI"
      VERITAS_DATABASE_URL: "postgresql+psycopg://veritas:veritas_test@localhost:5432/veritas_test"
      VERITAS_MEMORY_BACKEND: "postgresql"
      VERITAS_TRUSTLOG_BACKEND: "postgresql"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r veritas_os/requirements.txt
          python -m pip install "psycopg[binary]" psycopg-pool
          python -m pip install httpx anyio pytest alembic

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run PostgreSQL backend parity tests
        run: |
          set -euxo pipefail
          mkdir -p test-reports
          pytest -q \
            veritas_os/tests/test_storage_backend_contract.py \
            veritas_os/tests/test_storage_backend_parity_matrix.py \
            veritas_os/tests/test_storage_factory.py \
            --tb=short \
            --junitxml=test-reports/postgresql-smoke.xml

      - name: Run real PostgreSQL contention tests (Tier 3 advisory validation)
        # Validates advisory-lock serialisation on a live PostgreSQL 16 instance.
        # These tests run on every weekly production-validation run and provide
        # continuous high-fidelity evidence that the contention guarantee holds.
        #
        # Diagnosis:
        #   advisory lock failure   → check advisory lock key (0x5645524954415301)
        #   statement/lock timeout  → check DB under load; increase test margin
        #   chain verification fail → INSERT + UPDATE not in same transaction
        #   duplicate/gap           → UNIQUE constraint or advisory lock broken
        run: |
          set -euxo pipefail
          mkdir -p test-reports
          pytest -q \
            veritas_os/tests/test_pg_trustlog_contention.py \
            -m "postgresql and contention" \
            -v \
            --tb=short \
            --durations=10 \
            --junitxml=test-reports/postgresql-contention-prod.xml

      - name: Verify health reports PostgreSQL backends
        run: |
          set -euxo pipefail
          python3 -c "
          from veritas_os.storage.factory import get_backend_info
          info = get_backend_info()
          print(f'Configured backends: {info}')
          assert info['memory'] == 'postgresql', (
              f'Expected memory=postgresql, got {info[\"memory\"]!r} — '
              'backend not switched to PostgreSQL'
          )
          assert info['trustlog'] == 'postgresql', (
              f'Expected trustlog=postgresql, got {info[\"trustlog\"]!r} — '
              'backend not switched to PostgreSQL'
          )
          print('Health backend verification passed: both backends use PostgreSQL')
          "

      - name: Upload PostgreSQL smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postgresql-smoke-report
          path: test-reports/postgresql-smoke.xml
          if-no-files-found: warn

      - name: Upload PostgreSQL contention report (production-validation)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postgresql-contention-prod-report
          path: test-reports/postgresql-contention-prod.xml
          if-no-files-found: warn

  tls-validation:
    name: tls-validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      PYTHONUNBUFFERED: "1"
      OPENAI_API_KEY: "DUMMY_FOR_CI"
      VERITAS_API_KEY: "DUMMY_FOR_CI"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r veritas_os/requirements.txt
          python -m pip install pytest httpx anyio

      - name: Run TLS production validation tests
        run: |
          set -euxo pipefail
          pytest -q veritas_os/tests/ -m tls -v --tb=short

  load-validation:
    name: load-validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      PYTHONUNBUFFERED: "1"
      OPENAI_API_KEY: "DUMMY_FOR_CI"
      VERITAS_API_KEY: "DUMMY_FOR_CI"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r veritas_os/requirements.txt
          python -m pip install pytest httpx anyio

      - name: Run load production validation tests
        run: |
          set -euxo pipefail
          pytest -q veritas_os/tests/ -m load -v --tb=short

  # ── Docker Compose smoke test ─────────────────────────────────────────
  docker-smoke:
    name: docker-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.include_docker == 'true')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start services
        run: |
          set -euxo pipefail
          docker compose up -d --build --wait --timeout 120

      - name: Verify backend health
        run: |
          set -euxo pipefail
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo ""
              echo "Backend healthy!"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
            if [ "$i" -eq 30 ]; then
              echo "Backend health check timed out"
              docker compose logs backend
              exit 1
            fi
          done

      - name: Verify PostgreSQL backend selection
        run: |
          set -euxo pipefail
          HEALTH=$(curl -sf http://localhost:8000/health)
          echo "$HEALTH" | python3 -c "
          import json, sys
          health = json.load(sys.stdin)
          backends = health.get('storage_backends', {})
          memory = backends.get('memory', '')
          trustlog = backends.get('trustlog', '')
          print(f'Storage backends: memory={memory}, trustlog={trustlog}')
          assert memory == 'postgresql', f'Expected memory=postgresql, got {memory}'
          assert trustlog == 'postgresql', f'Expected trustlog=postgresql, got {trustlog}'
          print('PostgreSQL backend verification passed')
          "

      - name: Verify Memory read/write via PostgreSQL backend
        run: |
          set -euxo pipefail
          API_KEY="${VERITAS_API_KEY:-}"
          # Write a memory entry via POST /v1/memory/put
          curl -sf -X POST http://localhost:8000/v1/memory/put \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${API_KEY}" \
            -d '{"key":"__ci_pg_rw_test__","text":"prod-validation","user_id":"ci"}' \
            || echo "::warning::Memory write returned non-zero (may be expected without API key)"
          # Read it back via POST /v1/memory/get
          RESULT=$(curl -sf -X POST http://localhost:8000/v1/memory/get \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${API_KEY}" \
            -d '{"key":"__ci_pg_rw_test__","user_id":"ci"}' 2>/dev/null || true)
          echo "Memory read result: ${RESULT:-<empty>}"

      - name: Verify TrustLog read via PostgreSQL backend
        run: |
          set -euxo pipefail
          API_KEY="${VERITAS_API_KEY:-}"
          RESULT=$(curl -sf http://localhost:8000/v1/trust/logs \
            -H "X-API-Key: ${API_KEY}" 2>/dev/null || true)
          echo "TrustLog list result: ${RESULT:-<empty>}"
          echo "TrustLog read path exercised successfully"

      - name: Verify OpenAPI schema
        run: |
          set -euxo pipefail
          curl -sf http://localhost:8000/openapi.json | python3 -c "
          import json, sys
          schema = json.load(sys.stdin)
          assert schema.get('openapi', '').startswith('3.'), 'Invalid OpenAPI version'
          assert '/v1/decide' in str(schema.get('paths', {})), 'Missing /v1/decide'
          print('OpenAPI schema valid')
          "

      - name: Cleanup
        if: always()
        run: docker compose down --timeout 10

  # ── External API tests (opt-in) ──────────────────────────────────────
  external-tests:
    name: external-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.include_external == 'true'

    env:
      PYTHONUNBUFFERED: "1"
      OPENAI_API_KEY: "DUMMY_FOR_CI"
      VERITAS_API_KEY: "DUMMY_FOR_CI"
      VERITAS_WEBSEARCH_KEY: ${{ secrets.VERITAS_WEBSEARCH_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r veritas_os/requirements.txt
          python -m pip install pytest httpx anyio

      - name: Run external tests
        run: |
          set -euxo pipefail
          if [ -z "${VERITAS_WEBSEARCH_KEY:-}" ]; then
            echo "VERITAS_WEBSEARCH_KEY not set — skipping external tests"
            exit 0
          fi
          pytest -q veritas_os/tests/ \
            -m external \
            -v \
            --tb=short
