name: Reviewer Evidence Packet Validation

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  reviewer-evidence-packet-validation:
    name: reviewer-evidence-packet-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install local validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r veritas_os/requirements-core.txt

      - name: Create Reviewer Evidence Packet artifact directory
        run: mkdir -p artifacts/reviewer-evidence-packet

      - name: Validate Reviewer Evidence Packet and write report
        run: >
          python3 scripts/demo/validate_reviewer_evidence_packet.py
          > artifacts/reviewer-evidence-packet/reviewer-evidence-packet-validation-report.json

      - name: Check Reviewer Evidence Packet fixture
        run: python3 scripts/demo/check_reviewer_evidence_packet_fixture.py

      - name: Validate key provenance reviewer samples
        run: python3 scripts/quality/check_key_provenance_review_samples.py

      - name: Check reviewer handoff sample regeneration
        run: python3 scripts/quality/check_reviewer_handoff_sample_regeneration.py

      - name: Check reviewer handoff quickstart command
        run: python3 scripts/quality/check_reviewer_handoff_quickstart_command.py

      - name: Export current Reviewer Evidence Packet
        run: >
          python3 scripts/demo/export_reviewer_evidence_packet.py
          > artifacts/reviewer-evidence-packet/reviewer-evidence-packet-generated.json

      - name: Copy reviewer evidence packet reference artifacts
        run: |
          cp docs/en/demo/fixtures/reviewer-evidence-packet-saas-permission-change-v1.json \
            artifacts/reviewer-evidence-packet/reviewer-evidence-packet-golden-fixture.json
          cp docs/en/demo/schemas/reviewer-evidence-packet-v1.schema.json \
            artifacts/reviewer-evidence-packet/reviewer-evidence-packet-schema.json
          cp docs/en/demo/external-reviewer-quickstart.md \
            artifacts/reviewer-evidence-packet/external-reviewer-quickstart.md
          cp docs/en/demo/external-reviewer-artifact-index.md \
            artifacts/reviewer-evidence-packet/external-reviewer-artifact-index.md

      - name: Build Reviewer Evidence Packet artifact manifest
        run: |
          python3 scripts/demo/build_reviewer_evidence_artifact_manifest.py \
            artifacts/reviewer-evidence-packet
          test -f artifacts/reviewer-evidence-packet/reviewer-evidence-artifact-manifest.json

      - name: Verify Reviewer Evidence Packet artifact manifest
        run: |
          python3 scripts/demo/verify_reviewer_evidence_artifact_manifest.py \
            artifacts/reviewer-evidence-packet \
            > artifacts/reviewer-evidence-packet/reviewer-evidence-artifact-manifest-verification-report.json
          test -f artifacts/reviewer-evidence-packet/reviewer-evidence-artifact-manifest-verification-report.json

      - name: Build Reviewer Evidence Packet step summary
        run: |
          python3 scripts/demo/build_reviewer_evidence_step_summary.py \
            artifacts/reviewer-evidence-packet \
            --output-path artifacts/reviewer-evidence-packet/reviewer-evidence-step-summary.md \
            >> "$GITHUB_STEP_SUMMARY"
          test -f artifacts/reviewer-evidence-packet/reviewer-evidence-step-summary.md

      - name: Upload Reviewer Evidence Packet validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reviewer-evidence-packet-validation-artifacts
          path: artifacts/reviewer-evidence-packet/
          retention-days: 14
