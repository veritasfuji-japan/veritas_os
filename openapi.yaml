          type: string
      - in: query
        name: lineage_query
        required: false
        schema:
          type: string
      - in: query
        name: failed_only
        required: false
        schema:
          type: boolean
      - in: query
        name: recent_only
        required: false
        schema:
          type: boolean
      - in: query
        name: sort
