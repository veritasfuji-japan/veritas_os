openapi: 3.1.0
info:
  title: VERITAS Public API
  description: Decision Governance and Bind-Boundary Control Plane for AI Agents
  version: 1.0.0
servers:
- url: http://127.0.0.1:8000
security:
- ApiKeyAuth: []
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    Context:
      type: object
      required:
      - user_id
      - query
      properties:
        user_id:
          type: string
          maxLength: 500
        session_id:
          type: string
          maxLength: 500
        query:
          type: string
          maxLength: 10000
          description: ユーザ要求/問題文
        goals:
          type: array
          items:
            type: string
        constraints:
          type: array
          items:
            type: string
        time_horizon:
          type: string
          enum:
          - short
          - mid
          - long
        preferences:
          type: array
          items:
            type: string
          description: 返答スタイル等の好み設定リスト
        response_style:
          type: string
          enum:
          - logic
          - emotional
          - business
          - expert
          - casual
        tools_allowed:
          type: array
          items:
            type: string
        telos_weights:
          type: object
          additionalProperties:
            type: number
        affect_hint:
          type: object
          additionalProperties:
            type: string
          description: 感情ヒント（key-value形式）
    Option:
      type: object
      description: 入力用の候補選択肢（全フィールド省略可能）
      properties:
        id:
          type: string
          maxLength: 500
        title:
          type: string
          maxLength: 1000
        text:
          type: string
          maxLength: 1000
          description: titleの別名（後方互換フィールド）。titleが未指定の場合にtitleとして使用される。
        description:
          type: string
          maxLength: 20000
        score:
          type: number
        score_raw:
          type: number
          nullable: true
    Alt:
      type: object
      description: レスポンス用の候補選択肢（パイプラインにより正規化済み）
      required:
      - id
      - title
      - description
      - score
      properties:
        id:
          type: string
          default: ''
        title:
          type: string
          default: ''
        description:
          type: string
          default: ''
        score:
          type: number
          default: 1.0
        score_raw:
          type: number
          nullable: true
        world:
          type: object
          nullable: true
          additionalProperties: true
        meta:
          type: object
          nullable: true
          additionalProperties: true
    EvidenceItem:
      type: object
      required:
      - source
      - snippet
      - confidence
      properties:
        source:
          type: string
          default: unknown
          maxLength: 500
        uri:
          type: string
          format: uri
          nullable: true
          maxLength: 2000
        title:
          type: string
          nullable: true
          maxLength: 1000
        snippet:
          type: string
          default: ''
          maxLength: 50000
        confidence:
          type: number
          default: 0.7
          minimum: 0.0
          maximum: 1.0
    CritiqueItem:
      type: object
      required:
      - issue
      properties:
        issue:
          type: string
        severity:
          type: string
          enum:
          - low
          - med
          - high
          default: med
        fix:
          type: string
          nullable: true
    DebateView:
      type: object
      required:
      - stance
      - argument
      - score
      properties:
        stance:
          type: string
        argument:
          type: string
        score:
          type: number
    FujiDecision:
      type: object
      required:
      - status
      properties:
        status:
          type: string
          enum:
          - allow
          - modify
          - rejected
          - block
          - abstain
        reasons:
          type: array
          items:
            type: string
          default: []
        violations:
          type: array
          items:
            type: string
          default: []
        rule_hit:
          type: string
          nullable: true
          maxLength: 500
          description: トリガーされたポリシールールまたはキーワード
        severity:
          type: string
          nullable: true
          maxLength: 50
          description: リスク重大度 (low / medium / high / critical)
        remediation_hint:
          type: string
          nullable: true
          maxLength: 1000
          description: ゲート発火時のオペレーター向け修正提案
        risky_text_fragment:
          type: string
          nullable: true
          maxLength: 500
          description: ポリシールールをトリガーした入力の抜粋
    GateOut:
      type: object
      properties:
        risk:
          type: number
          default: 0.0
        telos_score:
          type: number
          default: 0.0
        bias:
          type: number
          nullable: true
        decision_status:
          type: string
          enum:
          - allow
          - modify
          - rejected
          - block
          - abstain
          default: allow
        reason:
          type: string
          nullable: true
        modifications:
          type: array
          default: []
          items:
            oneOf:
            - type: string
            - type: object
              additionalProperties: true
        rule_hit:
          type: string
          nullable: true
          maxLength: 500
          description: トリガーされたポリシールールまたはキーワード
        severity:
          type: string
          nullable: true
          maxLength: 50
          description: リスク重大度 (low / medium / high / critical)
        remediation_hint:
          type: string
          nullable: true
          maxLength: 1000
          description: ゲート発火時のオペレーター向け修正提案
        risky_text_fragment:
          type: string
          nullable: true
          maxLength: 500
          description: ポリシールールをトリガーした入力の抜粋
    ValuesOut:
      type: object
      required:
      - scores
      - total
      - top_factors
      - rationale
      properties:
        scores:
          type: object
          additionalProperties:
            type: number
        total:
          type: number
        top_factors:
          type: array
          items:
            type: string
        rationale:
          type: string
        ema:
          type: number
          nullable: true
    PersonaState:
      type: object
      properties:
        name:
          type: string
          default: VERITAS
        style:
          type: string
          default: direct, strategic, honest
        tone:
          type: string
          default: warm
        principles:
          type: array
          items:
            type: string
          default:
          - honesty
          - dignity
          - growth
        last_updated:
          type: string
          nullable: true
    EvoTips:
      type: object
      properties:
        insights:
          type: object
          additionalProperties: true
        actions:
          type: array
          items:
            type: string
        next_prompts:
          type: array
          items:
            type: string
        notes:
          type: array
          items:
            type: string
    StageMetrics:
      type: object
      description: パイプラインステージごとの実行メトリクス（extras.stage_metricsに格納）
      properties:
        latency_ms:
          type: number
          nullable: true
          description: ステージの実行時間（ミリ秒）
        health:
          type: string
          enum:
          - ok
          - warning
          - failed
          - unknown
          default: unknown
          description: パイプラインビジュアライザーが使用するステージヘルスステータス
        summary:
          type: string
          nullable: true
          maxLength: 500
          description: ステージ結果の1行説明
        detail:
          type: string
          nullable: true
          maxLength: 5000
          description: ステージの拡張診断テキスト（展開UIビューで表示）
        reason:
          type: string
          nullable: true
          maxLength: 2000
          description: 'detailが存在しない場合のフォールバック（例: ゲート拒否理由）'
    ChatRequest:
      type: object
      required:
      - message
      properties:
        message:
          type: string
          maxLength: 10000
        session_id:
          type: string
          nullable: true
          maxLength: 500
        memory_auto_put:
          type: boolean
          default: true
        persona_evolve:
          type: boolean
          default: true
    FujiRules:
      type: object
      description: FUJI安全ゲートのルール設定
      properties:
        pii_check:
          type: boolean
          default: true
        self_harm_block:
          type: boolean
          default: true
        illicit_block:
          type: boolean
          default: true
        violence_review:
          type: boolean
          default: true
        minors_review:
          type: boolean
          default: true
        keyword_hard_block:
          type: boolean
          default: true
        keyword_soft_flag:
          type: boolean
          default: true
        llm_safety_head:
          type: boolean
          default: true
    RiskThresholds:
      type: object
      description: リスクしきい値設定
      properties:
        allow_upper:
          type: number
          default: 0.4
          minimum: 0.0
          maximum: 1.0
        warn_upper:
          type: number
          default: 0.65
          minimum: 0.0
          maximum: 1.0
        human_review_upper:
          type: number
          default: 0.85
          minimum: 0.0
          maximum: 1.0
        deny_upper:
          type: number
          default: 1.0
          minimum: 0.0
          maximum: 1.0
    AutoStop:
      type: object
      description: 自動停止設定
      properties:
        enabled:
          type: boolean
          default: true
        max_risk_score:
          type: number
          default: 0.85
          minimum: 0.0
          maximum: 1.0
        max_consecutive_rejects:
          type: integer
          default: 5
          minimum: 1
          maximum: 1000
        max_requests_per_minute:
          type: integer
          default: 60
          minimum: 1
          maximum: 10000
    LogRetention:
      type: object
      description: ログ保持設定
      properties:
        retention_days:
          type: integer
          default: 90
          minimum: 1
          maximum: 3650
        audit_level:
          type: string
          default: full
          enum:
          - none
          - minimal
          - summary
          - standard
          - full
          - strict
        include_fields:
          type: array
          items:
            type: string
        redact_before_log:
          type: boolean
          default: true
        max_log_size:
          type: integer
          default: 10000
          minimum: 100
          maximum: 1000000
    RolloutControls:
      type: object
      description: 段階的適用コントロール
      properties:
        strategy:
          type: string
          default: disabled
          enum:
          - disabled
          - canary
          - staged
          - full
        canary_percent:
          type: integer
          default: 0
          minimum: 0
          maximum: 100
        stage:
          type: integer
          default: 0
          minimum: 0
          maximum: 10
        staged_enforcement:
          type: boolean
          default: false
    ApprovalWorkflowConfig:
      type: object
      description: 人手承認ワークフロー設定
      properties:
        human_review_ticket:
          type: string
          default: ''
        human_review_required:
          type: boolean
          default: false
        approver_identity_binding:
          type: boolean
          default: true
        approver_identities:
          type: array
          items:
            type: string
    WatConfig:
      type: object
      description: WAT 発行制御設定
      properties:
        enabled:
          type: boolean
          default: false
        issuance_mode:
          type: string
          default: shadow_only
          enum:
          - shadow_only
          - disabled
        require_observable_digest:
          type: boolean
          default: true
        default_ttl_seconds:
          type: integer
          default: 300
          minimum: 1
          maximum: 86400
        signer_backend:
          type: string
          default: existing_signer
        wat_metadata_retention_ttl_seconds:
          type: integer
          default: 7776000
          minimum: 60
          maximum: 315360000
          description: Primary audit path metadata retention TTL (seconds).
        wat_event_pointer_retention_ttl_seconds:
          type: integer
          default: 7776000
          minimum: 60
          maximum: 315360000
          description: Primary audit path event-pointer retention TTL (seconds).
        observable_digest_retention_ttl_seconds:
          type: integer
          default: 31536000
          minimum: 60
          maximum: 315360000
          description: Separate-store full observable digest retention TTL (seconds).
        observable_digest_access_class:
          type: string
          enum:
          - restricted
          - privileged
          default: restricted
          description: Access control class for separate-store digest payloads.
        observable_digest_ref:
          type: string
          default: separate_store://wat_observables
          description: Reference/locator prefix for separate-store digest material (not digest payload content).
        retention_policy_version:
          type: string
          default: wat_retention_v1
          description: Immutable once retention_enforced_at_write=true.
        retention_enforced_at_write:
          type: boolean
          default: true
          description: Enables write-time retention boundary enforcement.
    PsidConfig:
      type: object
      description: PSID 表示・適用設定
      properties:
        enforcement_mode:
          type: string
          default: full_digest_only
          enum:
          - full_digest_only
        display_length:
          type: integer
          default: 12
          minimum: 4
          maximum: 128
    ShadowValidationConfig:
      type: object
      description: シャドウ検証設定
      properties:
        enabled:
          type: boolean
          default: true
        partial_validation_default:
          type: string
          default: non_admissible
          enum:
          - non_admissible
        warning_only_until:
          type: string
          default: ''
        timestamp_skew_tolerance_seconds:
          type: integer
          default: 5
          minimum: 0
          maximum: 3600
        replay_binding_required:
          type: boolean
          default: false
        replay_binding_escalation_threshold:
          type: integer
          default: 4
          minimum: 1
          maximum: 16
        partial_validation_requires_confirmation:
          type: boolean
          default: true
    RevocationConfig:
      type: object
      description: 失効反映の整合性設定
      properties:
        enabled:
          type: boolean
          default: true
        mode:
          type: string
          default: bounded_eventual_consistency
          enum:
          - bounded_eventual_consistency
        alert_target_seconds:
          type: integer
          default: 30
          minimum: 1
          maximum: 86400
        convergence_target_p95_seconds:
          type: integer
          default: 60
          minimum: 1
          maximum: 86400
        degrade_on_pending:
          type: boolean
          default: true
        revocation_confirmation_required:
          type: boolean
          default: true
          description: Confirmed revocation state changes always require explicit confirmation in v1 runtime.
        auto_escalate_confirmed_revocations:
          type: boolean
          default: false
          description: Schema-only v1 placeholder; accepted for forward-compatibility but intentionally ignored by runtime handlers.
    DriftScoringConfig:
      type: object
      description: ドリフト評価スコア重み
      properties:
        policy_weight:
          type: number
          format: float
          default: 0.4
          minimum: 0
          maximum: 1
        signature_weight:
          type: number
          format: float
          default: 0.3
          minimum: 0
          maximum: 1
        observable_weight:
          type: number
          format: float
          default: 0.2
          minimum: 0
          maximum: 1
        temporal_weight:
          type: number
          format: float
          default: 0.1
          minimum: 0
          maximum: 1
        healthy_threshold:
          type: number
          format: float
          default: 0.2
          minimum: 0
          maximum: 1
        critical_threshold:
          type: number
          format: float
          default: 0.5
          minimum: 0
          maximum: 1
    BindAdjudicationPolicyConfig:
      type: object
      description: Bind adjudication runtime controls.
      properties:
        missing_signal_default:
          type: string
          enum:
          - block
          - escalate
          default: block
        drift_required:
          type: boolean
          default: true
        ttl_required:
          type: boolean
          default: false
        approval_freshness_required:
          type: boolean
          default: false
        rollback_on_apply_failure:
          type: boolean
          default: false
    GovernancePolicy:
      type: object
      description: ガバナンスポリシー設定
      properties:
        version:
          type: string
          default: governance_v1
        fuji_rules:
          $ref: '#/components/schemas/FujiRules'
        risk_thresholds:
          $ref: '#/components/schemas/RiskThresholds'
        auto_stop:
          $ref: '#/components/schemas/AutoStop'
        log_retention:
          $ref: '#/components/schemas/LogRetention'
        rollout_controls:
          $ref: '#/components/schemas/RolloutControls'
        approval_workflow:
          $ref: '#/components/schemas/ApprovalWorkflowConfig'
        wat:
          $ref: '#/components/schemas/WatConfig'
        psid:
          $ref: '#/components/schemas/PsidConfig'
        shadow_validation:
          $ref: '#/components/schemas/ShadowValidationConfig'
        revocation:
          $ref: '#/components/schemas/RevocationConfig'
        drift_scoring:
          $ref: '#/components/schemas/DriftScoringConfig'
        bind_adjudication:
          $ref: '#/components/schemas/BindAdjudicationPolicyConfig'
        operator_verbosity:
          type: string
          enum:
          - minimal
          - expanded
          default: minimal
          description: v1 operator-facing summary verbosity. Default stays minimal.
        updated_at:
          type: string
          format: date-time
        updated_by:
          type: string
          default: system
    GovernancePolicyResponse:
      type: object
      required:
      - ok
      - policy
      description: ガバナンスポリシーAPIレスポンス
      properties:
        ok:
          type: boolean
        policy:
          $ref: '#/components/schemas/GovernancePolicy'
        bind_summary:
          anyOf:
          - $ref: '#/components/schemas/BindSummary'
          - type: 'null'
          description: Shared compact bind summary object.
    ComplianceConfigResponse:
      type: object
      description: Compliance config response with optional bind lineage fields on
        mutation.
      properties:
        ok:
          type: boolean
        config:
          type: object
          nullable: true
          additionalProperties: true
        bind_outcome:
          type: string
          nullable: true
          description: Present when bind adjudication runs for compliance config mutation.
          enum:
          - COMMITTED
          - BLOCKED
          - ROLLED_BACK
          - ESCALATED
          - APPLY_FAILED
          - SNAPSHOT_FAILED
          - PRECONDITION_FAILED
        bind_failure_reason:
          type: string
          nullable: true
          description: Compact bind failure reason resolved from receipt checks.
        bind_reason_code:
          type: string
          nullable: true
          description: Stable bind reason code when available.
        bind_receipt_id:
          type: string
          nullable: true
        execution_intent_id:
          type: string
          nullable: true
        bind_receipt:
          allOf:
          - $ref: '#/components/schemas/BindReceipt'
          nullable: true
        error:
          type: string
          nullable: true
        bind_summary:
          anyOf:
          - $ref: '#/components/schemas/BindSummary'
          - type: 'null'
          description: Shared compact bind summary object.
    SystemHaltResponse:
      type: object
      description: System halt response with bind lineage fields.
      properties:
        ok:
          type: boolean
        halted:
          type: boolean
        halted_by:
          type: string
          nullable: true
        halted_at:
          type: string
          nullable: true
        reason:
          type: string
          nullable: true
        bind_outcome:
          type: string
          nullable: true
          description: Present when bind adjudication runs for system halt mutation.
          enum:
          - COMMITTED
          - BLOCKED
          - ROLLED_BACK
          - ESCALATED
          - APPLY_FAILED
          - SNAPSHOT_FAILED
          - PRECONDITION_FAILED
        bind_failure_reason:
          type: string
          nullable: true
          description: Compact bind failure reason resolved from receipt checks.
        bind_reason_code:
          type: string
          nullable: true
          description: Stable bind reason code when available.
        bind_receipt_id:
          type: string
          nullable: true
        execution_intent_id:
          type: string
          nullable: true
        bind_receipt:
          allOf:
          - $ref: '#/components/schemas/BindReceipt'
          nullable: true
        error:
          type: string
          nullable: true
        bind_summary:
          anyOf:
          - $ref: '#/components/schemas/BindSummary'
          - type: 'null'
          description: Shared compact bind summary object.
    SystemResumeResponse:
      type: object
      description: System resume response with bind lineage fields.
      properties:
        ok:
          type: boolean
        halted:
          type: boolean
        halted_by:
          type: string
          nullable: true
        halted_at:
          type: string
          nullable: true
        reason:
          type: string
          nullable: true
        bind_outcome:
          type: string
          nullable: true
          description: Present when bind adjudication runs for system resume mutation.
          enum:
          - COMMITTED
          - BLOCKED
          - ROLLED_BACK
          - ESCALATED
          - APPLY_FAILED
          - SNAPSHOT_FAILED
          - PRECONDITION_FAILED
        bind_failure_reason:
          type: string
          nullable: true
          description: Compact bind failure reason resolved from receipt checks.
        bind_reason_code:
          type: string
          nullable: true
          description: Stable bind reason code when available.
        bind_receipt_id:
          type: string
          nullable: true
        execution_intent_id:
          type: string
          nullable: true
        bind_receipt:
          allOf:
          - $ref: '#/components/schemas/BindReceipt'
          nullable: true
        error:
          type: string
          nullable: true
        bind_summary:
          anyOf:
          - $ref: '#/components/schemas/BindSummary'
          - type: 'null'
          description: Shared compact bind summary object.
    ExecutionIntent:
      type: object
      description: Decision-linked execution attempt descriptor.
      properties:
        execution_intent_id:
          type: string
        decision_id:
          type: string
        request_id:
          type: string
        policy_snapshot_id:
          type: string
        actor_identity:
          type: string
        target_system:
          type: string
        target_resource:
          type: string
        intended_action:
          type: string
        evidence_refs:
          type: array
          items:
            type: string
        decision_hash:
          type: string
        decision_ts:
          type: string
        ttl_seconds:
          type: integer
          nullable: true
        expected_state_fingerprint:
          type: string
          nullable: true
        approval_context:
          type: object
          nullable: true
          additionalProperties: true
        policy_lineage:
          type: object
          nullable: true
          additionalProperties: true
    BindReceipt:
      type: object
      description: Bind-time governance artifact linked to decision lineage. Canonical
        target metadata fields are part of this artifact contract.
      properties:
        bind_receipt_id:
          type: string
        execution_intent_id:
          type: string
        decision_id:
          type: string
        bind_ts:
          type: string
        live_state_fingerprint_before:
          type: string
        live_state_fingerprint_after:
          type: string
        authority_check_result:
          type: object
          additionalProperties: true
        constraint_check_result:
          type: object
          additionalProperties: true
        drift_check_result:
          type: object
          additionalProperties: true
        risk_check_result:
          type: object
          additionalProperties: true
        admissibility_result:
          type: object
          additionalProperties: true
        final_outcome:
          type: string
          enum:
          - COMMITTED
          - BLOCKED
          - ROLLED_BACK
          - ESCALATED
          - APPLY_FAILED
          - SNAPSHOT_FAILED
          - PRECONDITION_FAILED
        rollback_reason:
          type: string
          nullable: true
        escalation_reason:
          type: string
          nullable: true
        trustlog_hash:
          type: string
        prev_bind_hash:
          type: string
          nullable: true
        target_path:
          type: string
          description: Canonical bind-governed target API path.
        target_type:
          type: string
          description: Canonical bind-governed target type identifier.
        target_path_type:
          type: string
          description: Canonical target path classification. Unknown/unmapped paths
            resolve to `other`.
        target_label:
          type: string
          description: Operator-facing canonical label for target path/type.
        operator_surface:
          type: string
          description: Canonical operator surface owner for this target.
        relevant_ui_href:
