              type: number
        options:
          type: array
          default: []
          items:
            $ref: '#/components/schemas/Alt'
          description: 候補選択肢（後方互換フィールド、alternativesと同値に正規化）
        alternatives:
          type: array
          default: []
          items:
            $ref: '#/components/schemas/Alt'
          description: 候補選択肢（canonicalフィールド）
        evidence:
          type: array
          default: []
          items:
            $ref: '#/components/schemas/EvidenceItem'
        critique:
          type: array
          default: []
          items:
            $ref: '#/components/schemas/CritiqueItem'
        debate:
          type: array
          default: []
          items:
            $ref: '#/components/schemas/DebateView'
        telos_score:
          type: number
          default: 0.0
        fuji:
          type: object
          additionalProperties: true
        trust_log:
          oneOf:
          - $ref: '#/components/schemas/TrustLog'
          - type: object
            additionalProperties: true
          nullable: true
        rsi_note:
          type: object
          nullable: true
          additionalProperties: true
          description: RSI関連メタ情報（オブジェクト形式）
        decision_status:
          type: string
          enum:
          - allow
          - modify
          - rejected
          - block
          - abstain
          default: allow
          description: Legacy compatibility decision status. Public contract should
            prefer gate_decision.
        rejection_reason:
          type: string
          nullable: true
        gate_decision:
          type: string
          enum:
          - proceed
          - hold
          - block
          - human_review_required
          - allow
          - deny
          - modify
          - rejected
          - abstain
          - unknown
          default: unknown
          description: Canonical public values are proceed|hold|block|human_review_required.
            Legacy aliases remain compatibility-only inputs and are normalized before
            public output. proceed indicates gate pass-through only and is not business
            approval.
          examples:
          - proceed
          - hold
          - human_review_required
          - block
        business_decision:
          type: string
          enum:
          - APPROVE
          - DENY
          - HOLD
          - REVIEW_REQUIRED
          - POLICY_DEFINITION_REQUIRED
          - EVIDENCE_REQUIRED
          default: HOLD
          description: Business lifecycle decision state. Keep distinct from next_action.
        next_action:
          type: string
          default: REVISE_AND_RESUBMIT
          description: Operational guidance action; separate from business_decision
            state.
        actionability_status:
          type: string
          enum:
          - reviewable_only
          - bind_required_before_execution
          - actionable_after_bind
          - blocked
          - human_review_required
          default: reviewable_only
          description: Explicit execution boundary state. A recorded decision is reviewable
            and does not grant execution permission without bind lineage.
        requires_bind_before_execution:
          type: boolean
          default: true
          description: True when execution requires bind before operational action.
            This remains true unless a bind receipt is present and committed.
        bound_execution_intent_id:
          type: string
          nullable: true
          description: Execution intent identifier that is already bound, when available.
        unbound_execution_warning:
          type: string
          nullable: true
          description: Operator-facing warning that decision output is not executable
            until bind receipt lineage is present.
        required_evidence:
          type: array
          default: []
          maxItems: 100
          items:
            type: string
        missing_evidence:
          type: array
          default: []
          maxItems: 100
          items:
            type: string
        satisfied_evidence:
          type: array
          default: []
          maxItems: 100
          items:
            type: string
        human_review_required:
          type: boolean
          default: false
          description: Must be true when gate_decision=human_review_required or business_decision=REVIEW_REQUIRED.
            REVIEW_REQUIRED must be paired with gate_decision=human_review_required.
        rationale:
          type: string
          nullable: true
        refusal_reason:
          type: string
          nullable: true
        values:
          $ref: '#/components/schemas/ValuesOut'
          nullable: true
        gate:
          $ref: '#/components/schemas/GateOut'
        extras:
          type: object
          additionalProperties: true
        meta:
          type: object
          additionalProperties: true
        persona:
