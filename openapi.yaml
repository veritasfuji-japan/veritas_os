      - wat_id
      properties:
        wat_id:
          type: string
        outcome_event:
          type: string
          default: wat_validated
        psid:
          type: string
          nullable: true
        observable_digest_ref:
          type: string
          nullable: true
          description: Separate-store observable digest locator/reference.
        observable_digest:
          type: string
          nullable: true
          description: Legacy transitional field; digest payloads are not treated as observable_digest_ref.
        details:
          type: object
          additionalProperties: true
    WatRevocationRequest:
      type: object
      properties:
        confirmed:
          type: boolean
          default: true
        confirmation:
          type: string
          default: ''
          description: Must be CONFIRM_REVOKED_CONFIRMED for confirmed state changes.
        reason:
          type: string
        details:
          type: object
          additionalProperties: true
    BindSummary:
      type: object
      description: Compact bind summary shared across mutation/export responses. Full
        artifact data remains in BindReceipt.
      properties:
        bind_outcome:
          anyOf:
          - $ref: '#/components/schemas/FinalOutcome'
          - type: 'null'
        bind_failure_reason:
          anyOf:
          - type: string
          - type: 'null'
        bind_reason_code:
          anyOf:
          - type: string
          - type: 'null'
        bind_receipt_id:
          anyOf:
          - type: string
          - type: 'null'
        execution_intent_id:
          anyOf:
          - type: string
          - type: 'null'
        authority_check_result:
          anyOf:
          - type: object
            additionalProperties: true
          - type: 'null'
        constraint_check_result:
          anyOf:
          - type: object
            additionalProperties: true
          - type: 'null'
        drift_check_result:
          anyOf:
          - type: object
            additionalProperties: true
          - type: 'null'
        risk_check_result:
          anyOf:
          - type: object
            additionalProperties: true
          - type: 'null'
        target_path:
          anyOf:
          - type: string
          - type: 'null'
        target_type:
          anyOf:
          - type: string
          - type: 'null'
        target_path_type:
          anyOf:
          - type: string
          - type: 'null'
        target_label:
          anyOf:
          - type: string
          - type: 'null'
        operator_surface:
          anyOf:
          - type: string
          - type: 'null'
        relevant_ui_href:
          anyOf:
          - type: string
          - type: 'null'
paths:
  /health:
    get:
      security: []
      summary: Health check
      responses:
        '200':
          description: OK
  /v1/decide:
    post:
      summary: Run full VERITAS decision loop
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecideRequest'
      responses:
        '200':
          description: Decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecideResponse'
  /v1/replay/{decision_id}:
    post:
      summary: Replay a persisted decision and store replay report
      parameters:
      - in: path
        name: decision_id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Replay execution result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  decision_id:
                    type: string
                  replay_path:
                    type: string
                  match:
                    type: boolean
                  diff_summary:
                    type: string
                  replay_time_ms:
                    type: integer
                  schema_version:
                    type: string
                    description: Replay artifact schema version (e.g. "1.0.0")
                  severity:
                    type: string
                    description: Highest severity among changed fields (critical,
                      warning, info)
                    enum:
                    - critical
                    - warning
                    - info
                  divergence_level:
                    type: string
                    description: Overall divergence classification
                    enum:
                    - no_divergence
                    - acceptable_divergence
                    - critical_divergence
                  audit_summary:
                    type: string
                    description: Human-readable audit summary of the replay result
  /v1/decision/replay/{decision_id}:
    post:
      summary: Decision replay (v2)
      parameters:
      - in: path
        name: decision_id
