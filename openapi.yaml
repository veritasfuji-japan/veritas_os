        alternatives:
          type: array
          items:
            $ref: '#/components/schemas/Option'
          description: 候補選択肢（canonicalフィールド）
        options:
          type: array
          items:
            $ref: '#/components/schemas/Option'
          description: 候補選択肢（後方互換フィールド、alternativesを優先）
