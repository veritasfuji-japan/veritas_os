        ts:
          type: string
          format: date-time
        lane:
          type: string
          enum:
          - wat_shadow
        wat_id:
          type: string
        event_type:
          type: string
        actor:
          type: string
        status:
          type: string
        details:
          type: object
          additionalProperties: true
          description: Lean primary audit payload; metadata + pointers only.
        trustlog_anchor_ref:
          type: object
          additionalProperties: true
    WatIssueShadowRequest:
      type: object
      required:
      - psid
      properties:
        wat_id:
          type: string
        psid:
          type: string
        observable_digest_ref:
          type: string
          nullable: true
          description: Separate-store observable digest locator/reference.
        observable_digest:
          type: string
          nullable: true
          description: Legacy transitional field; digest payloads are not treated as observable_digest_ref.
        ttl_seconds:
          type: integer
          minimum: 1
          maximum: 86400
          default: 300
        metadata:
          type: object
          additionalProperties: true
    WatValidateShadowRequest:
      type: object
