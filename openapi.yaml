                        operator_surface:
                          type: string
                        relevant_ui_href:
                          type: string
                        supports_filtering:
                          type: boolean
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/BindReceipt'
        '400':
          description: Invalid bind receipt export parameter
