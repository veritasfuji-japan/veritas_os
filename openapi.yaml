        wat_drift_vector:
          $ref: '#/components/schemas/WatDriftVector'
          nullable: true
          description: Canonical additive WAT drift vector with normalized keys.
        wat_operator_summary:
          $ref: '#/components/schemas/WatOperatorSummary'
