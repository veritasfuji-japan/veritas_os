openapi: 3.1.0
info:
  title: VERITAS Public API
  version: 1.0.0

servers:
  - url: http://127.0.0.1:8000

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    Context:
      type: object
      required: [user_id, query]
      properties:
        user_id:
          type: string
        session_id:
          type: string
        query:
          type: string
          description: "ユーザ要求/問題文"
        goals:
          type: array
          items:
            type: string
        constraints:
          type: array
          items:
            type: string
        time_horizon:
          type: string
          enum: ["short", "mid", "long"]
        preferences:
          type: array
          items:
            type: string
          description: "返答スタイル等の好み設定リスト"
        response_style:
          type: string
          enum: ["logic", "emotional", "business", "expert", "casual"]
        tools_allowed:
          type: array
          items:
            type: string
        telos_weights:
          type: object
          additionalProperties:
            type: number
        affect_hint:
          type: object
          additionalProperties:
            type: string
          description: "感情ヒント（key-value形式）"

    Option:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        score:
          type: number
        score_raw:
          type: number
        world:
          type: object
          nullable: true
          additionalProperties: true
        meta:
          type: object
          nullable: true
          additionalProperties: true

    EvidenceItem:
      type: object
      required: [source, snippet, confidence]
      properties:
        source:
          type: string
        uri:
          type: string
          format: uri
        title:
          type: string
          nullable: true
        snippet:
          type: string
        confidence:
          type: number

    CritiqueItem:
      type: object
      properties:
        issue:
          type: string
        severity:
          type: string
          enum: ["low", "med", "high"]
        fix:
          type: string

    DebateView:
      type: object
      properties:
        stance:
          type: string
        argument:
          type: string
        score:
          type: number

    FujiDecision:
      type: object
      properties:
        status:
          type: string
          enum: ["allow", "modify", "rejected", "block", "abstain"]
        reasons:
          type: array
          items:
            type: string
        violations:
          type: array
          items:
            type: string

    GateOut:
      type: object
      properties:
        risk:
          type: number
        telos_score:
          type: number
        bias:
          type: number
          nullable: true
        decision_status:
          type: string
          enum: ["allow", "modify", "rejected", "block", "abstain"]
        reason:
          type: string
          nullable: true
        modifications:
          type: array
          items:
            oneOf:
              - type: string
              - type: object
                additionalProperties: true

    ValuesOut:
      type: object
      properties:
        scores:
          type: object
          additionalProperties:
            type: number
        total:
          type: number
        top_factors:
          type: array
          items:
            type: string
        rationale:
          type: string
        ema:
          type: number
          nullable: true

    TrustLog:
      type: object
      required: [request_id, created_at, sources, critics, checks, approver]
      properties:
        request_id:
          type: string
        created_at:
          type: string
          format: date-time
        sources:
          type: array
          items:
            type: string
        critics:
          type: array
          items:
            type: string
        checks:
          type: array
          items:
            type: string
        approver:
          type: string
        fuji:
          $ref: '#/components/schemas/FujiDecision'
          nullable: true
        sha256_prev:
          type: string
          nullable: true
          description: "チェーン用ハッシュ"

    DecideResponse:
      type: object
      properties:
        ok:
          type: boolean
          description: "レスポンス成否フラグ"
        error:
          type: string
          nullable: true
          description: "エラー詳細（ok=falseの場合に設定）"
        request_id:
          type: string
        version:
          type: string
        chosen:
          type: object
          properties:
            action:
              type: string
            rationale:
              type: string
            uncertainty:
              type: number
        options:
          type: array
          items:
            $ref: '#/components/schemas/Option'
        alternatives:
          type: array
          items:
            $ref: '#/components/schemas/Option'
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/EvidenceItem'
        critique:
          type: array
          items:
            $ref: '#/components/schemas/CritiqueItem'
        debate:
          type: array
          items:
            $ref: '#/components/schemas/DebateView'
        telos_score:
          type: number
        fuji:
          type: object
          additionalProperties: true
        trust_log:
          $ref: '#/components/schemas/TrustLog'
          nullable: true
        rsi_note:
          type: object
          nullable: true
          additionalProperties: true
          description: "RSI関連メタ情報（オブジェクト形式）"
        decision_status:
          type: string
          enum: ["allow", "modify", "rejected", "block", "abstain"]
        rejection_reason:
          type: string
          nullable: true
        values:
          $ref: '#/components/schemas/ValuesOut'
          nullable: true
        gate:
          $ref: '#/components/schemas/GateOut'
        extras:
          type: object
          additionalProperties: true
        meta:
          type: object
          additionalProperties: true
        persona:
          type: object
          additionalProperties: true
        plan:
          type: object
          nullable: true
          additionalProperties: true
        planner:
          type: object
          nullable: true
          additionalProperties: true
        reason:
          nullable: true
        evo:
          type: object
          nullable: true
          additionalProperties: true
        memory_citations:
          type: array
          items: {}
        memory_used_count:
          type: integer
        ai_disclosure:
          type: string
        regulation_notice:
          type: string
        affected_parties_notice:
          type: object
          nullable: true
          additionalProperties: true
          description: "高リスクAI決定で第三者に影響する場合の通知レコード"

security:
  - ApiKeyAuth: []

paths:
  /health:
    get:
      security: []
      summary: Health check
      responses:
        "200":
          description: OK

  /v1/decide:
    post:
      summary: Run full VERITAS decision loop
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  default: ""
                  description: "ユーザ要求/問題文（context.queryの代替）"
                context:
                  oneOf:
                    - $ref: '#/components/schemas/Context'
                    - type: object
                      additionalProperties: true
                  default: {}
                  description: "コンテキスト情報（省略可、デフォルト空dict）"
                alternatives:
                  type: array
                  items:
                    $ref: '#/components/schemas/Option'
                  description: "候補選択肢（canonicalフィールド）"
                options:
                  type: array
                  items:
                    $ref: '#/components/schemas/Option'
                  description: "候補選択肢（後方互換フィールド、alternativesを優先）"
                min_evidence:
                  type: integer
                  default: 1
                memory_auto_put:
                  type: boolean
                  default: true
                persona_evolve:
                  type: boolean
                  default: true
      responses:
        "200":
          description: Decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecideResponse'

  /v1/replay/{decision_id}:
    post:
      summary: Replay a persisted decision and store replay report
      parameters:
        - in: path
          name: decision_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Replay execution result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  decision_id:
                    type: string
                  replay_path:
                    type: string
                  match:
                    type: boolean
                  diff_summary:
                    type: string
                  replay_time_ms:
                    type: integer

  /v1/decision/replay/{decision_id}:
    post:
      summary: Decision replay (v2)
      parameters:
        - in: path
          name: decision_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Replay execution result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /v1/fuji/validate:
    post:
      summary: Safety/ethics validation for a candidate action
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, context]
              properties:
                action:
                  type: string
                context:
                  $ref: '#/components/schemas/Context'
      responses:
        "200":
          description: FUJI decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FujiDecision'

  /v1/memory/put:
    post:
      summary: Append to persistent memory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, key, value]
              properties:
                user_id:
                  type: string
                key:
                  type: string
                value:
                  type: string
      responses:
        "200":
          description: OK

  /v1/memory/get:
    post:
      summary: Retrieve memory by key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, key]
              properties:
                user_id:
                  type: string
                key:
                  type: string
      responses:
        "200":
          description: value
          content:
            application/json:
              schema:
                type: object
                properties:
                  value:
                    type: string

  /v1/memory/search:
    post:
      summary: Memory search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /v1/memory/erase:
    post:
      summary: Memory erasure
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Erasure result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /v1/trust/{request_id}:
    get:
      summary: Get trust log entries for a request (with chain verification)
      parameters:
        - in: path
          name: request_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Trust log entries for the given request_id with chain integrity result
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/TrustLog'
                  count:
                    type: integer
                  chain_ok:
                    type: boolean
                  verification_result:
                    type: string
                    enum: ["ok", "broken", "not_found"]

  /v1/trust/logs:
    get:
      summary: Cursor-paginated trust log listing
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
          description: "カーソル（前回レスポンスの next_cursor を指定）"
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
          description: "1回の取得件数上限"
      responses:
        "200":
          description: Cursor-paginated trust logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/TrustLog'
                  cursor:
                    type: string
                    description: "現在のオフセット（文字列）"
                  next_cursor:
                    type: string
                    nullable: true
                    description: "次ページのカーソル（null = 末尾）"
                  limit:
                    type: integer
                  has_more:
                    type: boolean

  /v1/trust/feedback:
    post:
      summary: Human feedback recording
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Feedback recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /v1/trustlog/verify:
    get:
      summary: Trust log chain verification
      responses:
        "200":
          description: Chain verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  valid:
                    type: boolean
                  detail:
                    type: string

  /v1/trustlog/export:
    get:
      summary: Trust log export
      responses:
        "200":
          description: Exported trust logs
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /v1/events:
    get:
      summary: SSE event stream
      responses:
        "200":
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                type: string

  /v1/metrics:
    get:
      summary: System metrics
      responses:
        "200":
          description: System metrics
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /v1/governance/value-drift:
    get:
      summary: Value drift metrics
      responses:
        "200":
          description: Value drift data
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /v1/governance/policy:
    get:
      summary: Governance policy read
      responses:
        "200":
          description: Governance policy
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    put:
      summary: Governance policy update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Updated policy
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /v1/compliance/config:
    get:
      summary: Compliance config read
      responses:
        "200":
          description: Compliance config
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  config:
                    type: object
                    additionalProperties: true
    put:
      summary: Compliance config update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /v1/compliance/deployment-readiness:
    get:
      summary: Deployment readiness check
      responses:
        "200":
          description: Deployment readiness result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  ready:
                    type: boolean
                  checks:
                    type: object
                    additionalProperties: true

  /v1/system/halt:
    post:
      summary: Emergency system halt
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: System halted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  halted:
                    type: boolean

  /v1/system/resume:
    post:
      summary: System resume
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: System resumed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  halted:
                    type: boolean

  /v1/system/halt-status:
    get:
      summary: Halt status check
      responses:
        "200":
          description: Current halt status
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  halted:
                    type: boolean
                  reason:
                    type: string
                    nullable: true

  /v1/report/eu_ai_act/{decision_id}:
    get:
      summary: EU AI Act report for a decision
      parameters:
        - in: path
          name: decision_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: EU AI Act compliance report
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /v1/report/governance:
    get:
      summary: Governance report
      responses:
        "200":
          description: Governance report
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
