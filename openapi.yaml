          nullable: true
          additionalProperties: true
        planner:
          type: object
          nullable: true
          additionalProperties: true
        reason:
          nullable: true
        evo:
          oneOf:
          - $ref: '#/components/schemas/EvoTips'
          - type: object
            additionalProperties: true
          nullable: true
        memory_citations:
          type: array
          default: []
          items: {}
        memory_used_count:
          type: integer
          default: 0
        ai_disclosure:
          type: string
