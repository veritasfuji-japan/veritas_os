openapi: 3.1.0
info:
  title: VERITAS Public API
  version: 1.0.0

servers:
  - url: http://127.0.0.1:8000

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    Context:
      type: object
      required: [user_id, query]
      properties:
        user_id:
          type: string
          maxLength: 500
        session_id:
          type: string
          maxLength: 500
        query:
          type: string
          maxLength: 10000
          description: "ユーザ要求/問題文"
        goals:
          type: array
          items:
            type: string
        constraints:
          type: array
          items:
            type: string
        time_horizon:
          type: string
          enum: ["short", "mid", "long"]
        preferences:
          type: array
          items:
            type: string
          description: "返答スタイル等の好み設定リスト"
        response_style:
          type: string
          enum: ["logic", "emotional", "business", "expert", "casual"]
        tools_allowed:
          type: array
          items:
            type: string
        telos_weights:
          type: object
          additionalProperties:
            type: number
        affect_hint:
          type: object
          additionalProperties:
            type: string
          description: "感情ヒント（key-value形式）"

    Option:
      type: object
      description: "入力用の候補選択肢（全フィールド省略可能）"
      properties:
        id:
          type: string
          maxLength: 500
        title:
          type: string
          maxLength: 1000
        text:
          type: string
          maxLength: 1000
          description: "titleの別名（後方互換フィールド）。titleが未指定の場合にtitleとして使用される。"
        description:
          type: string
          maxLength: 20000
        score:
          type: number
        score_raw:
          type: number
          nullable: true

    Alt:
      type: object
      description: "レスポンス用の候補選択肢（パイプラインにより正規化済み）"
      required: [id, title, description, score]
      properties:
        id:
          type: string
          default: ""
        title:
          type: string
          default: ""
        description:
          type: string
          default: ""
        score:
          type: number
          default: 1.0
        score_raw:
          type: number
          nullable: true
        world:
          type: object
          nullable: true
          additionalProperties: true
        meta:
          type: object
          nullable: true
          additionalProperties: true

    EvidenceItem:
      type: object
      required: [source, snippet, confidence]
      properties:
        source:
          type: string
          default: "unknown"
          maxLength: 500
        uri:
          type: string
          format: uri
          nullable: true
          maxLength: 2000
        title:
          type: string
          nullable: true
          maxLength: 1000
        snippet:
          type: string
          default: ""
          maxLength: 50000
        confidence:
          type: number
          default: 0.7

    CritiqueItem:
      type: object
      required: [issue]
      properties:
        issue:
          type: string
        severity:
          type: string
          enum: ["low", "med", "high"]
          default: "med"
        fix:
          type: string
          nullable: true

    DebateView:
      type: object
      required: [stance, argument, score]
      properties:
        stance:
          type: string
        argument:
          type: string
        score:
          type: number

    FujiDecision:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: ["allow", "modify", "rejected", "block", "abstain"]
        reasons:
          type: array
          items:
            type: string
        violations:
          type: array
          items:
            type: string
        rule_hit:
          type: string
          nullable: true
          maxLength: 500
          description: "トリガーされたポリシールールまたはキーワード"
        severity:
          type: string
          nullable: true
          maxLength: 50
          description: "リスク重大度 (low / medium / high / critical)"
        remediation_hint:
          type: string
          nullable: true
          maxLength: 1000
          description: "ゲート発火時のオペレーター向け修正提案"
        risky_text_fragment:
          type: string
          nullable: true
          maxLength: 500
          description: "ポリシールールをトリガーした入力の抜粋"

    GateOut:
      type: object
      properties:
        risk:
          type: number
          default: 0.0
        telos_score:
          type: number
          default: 0.0
        bias:
          type: number
          nullable: true
        decision_status:
          type: string
          enum: ["allow", "modify", "rejected", "block", "abstain"]
          default: "allow"
        reason:
          type: string
          nullable: true
        modifications:
          type: array
          items:
            oneOf:
              - type: string
              - type: object
                additionalProperties: true
        rule_hit:
          type: string
          nullable: true
          maxLength: 500
          description: "トリガーされたポリシールールまたはキーワード"
        severity:
          type: string
          nullable: true
          maxLength: 50
          description: "リスク重大度 (low / medium / high / critical)"
        remediation_hint:
          type: string
          nullable: true
          maxLength: 1000
          description: "ゲート発火時のオペレーター向け修正提案"
        risky_text_fragment:
          type: string
          nullable: true
          maxLength: 500
          description: "ポリシールールをトリガーした入力の抜粋"

    ValuesOut:
      type: object
      required: [scores, total, top_factors, rationale]
      properties:
        scores:
          type: object
          additionalProperties:
            type: number
        total:
          type: number
        top_factors:
          type: array
          items:
            type: string
        rationale:
          type: string
        ema:
          type: number
          nullable: true

    PersonaState:
      type: object
      properties:
        name:
          type: string
          default: "VERITAS"
        style:
          type: string
          default: "direct, strategic, honest"
        tone:
          type: string
          default: "warm"
        principles:
          type: array
          items:
            type: string
          default: ["honesty", "dignity", "growth"]
        last_updated:
          type: string
          nullable: true

    EvoTips:
      type: object
      properties:
        insights:
          type: object
          additionalProperties: true
        actions:
          type: array
          items:
            type: string
        next_prompts:
          type: array
          items:
            type: string
        notes:
          type: array
          items:
            type: string

    StageMetrics:
      type: object
      description: "パイプラインステージごとの実行メトリクス（extras.stage_metricsに格納）"
      properties:
        latency_ms:
          type: number
          nullable: true
          description: "ステージの実行時間（ミリ秒）"
        health:
          type: string
          enum: ["ok", "warning", "failed", "unknown"]
          default: "unknown"
          description: "パイプラインビジュアライザーが使用するステージヘルスステータス"
        summary:
          type: string
          nullable: true
          maxLength: 500
          description: "ステージ結果の1行説明"
        detail:
          type: string
          nullable: true
          maxLength: 5000
          description: "ステージの拡張診断テキスト（展開UIビューで表示）"
        reason:
          type: string
          nullable: true
          maxLength: 2000
          description: "detailが存在しない場合のフォールバック（例: ゲート拒否理由）"

    ChatRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          maxLength: 10000
        session_id:
          type: string
          nullable: true
          maxLength: 500
        memory_auto_put:
          type: boolean
          default: true
        persona_evolve:
          type: boolean
          default: true

    FujiRules:
      type: object
      description: "FUJI安全ゲートのルール設定"
      properties:
        pii_check:
          type: boolean
          default: true
        self_harm_block:
          type: boolean
          default: true
        illicit_block:
          type: boolean
          default: true
        violence_review:
          type: boolean
          default: true
        minors_review:
          type: boolean
          default: true
        keyword_hard_block:
          type: boolean
          default: true
        keyword_soft_flag:
          type: boolean
          default: true
        llm_safety_head:
          type: boolean
          default: true

    RiskThresholds:
      type: object
      description: "リスクしきい値設定"
      properties:
        allow_upper:
          type: number
          default: 0.40
          minimum: 0.0
          maximum: 1.0
        warn_upper:
          type: number
          default: 0.65
          minimum: 0.0
          maximum: 1.0
        human_review_upper:
          type: number
          default: 0.85
          minimum: 0.0
          maximum: 1.0
        deny_upper:
          type: number
          default: 1.00
          minimum: 0.0
          maximum: 1.0

    AutoStop:
      type: object
      description: "自動停止設定"
      properties:
        enabled:
          type: boolean
          default: true
        max_risk_score:
          type: number
          default: 0.85
          minimum: 0.0
          maximum: 1.0
        max_consecutive_rejects:
          type: integer
          default: 5
          minimum: 1
          maximum: 1000
        max_requests_per_minute:
          type: integer
          default: 60
          minimum: 1
          maximum: 10000

    LogRetention:
      type: object
      description: "ログ保持設定"
      properties:
        retention_days:
          type: integer
          default: 90
          minimum: 1
          maximum: 3650
        audit_level:
          type: string
          default: "full"
          enum: ["none", "minimal", "summary", "standard", "full", "strict"]
        include_fields:
          type: array
          items:
            type: string
        redact_before_log:
          type: boolean
          default: true
        max_log_size:
          type: integer
          default: 10000
          minimum: 100
          maximum: 1000000

    GovernancePolicy:
      type: object
      description: "ガバナンスポリシー設定"
      properties:
        version:
          type: string
          default: "governance_v1"
        fuji_rules:
          $ref: '#/components/schemas/FujiRules'
        risk_thresholds:
          $ref: '#/components/schemas/RiskThresholds'
        auto_stop:
          $ref: '#/components/schemas/AutoStop'
        log_retention:
          $ref: '#/components/schemas/LogRetention'
        updated_at:
          type: string
          format: date-time
        updated_by:
          type: string
          default: "system"

    GovernancePolicyResponse:
      type: object
      required: [ok, policy]
      description: "ガバナンスポリシーAPIレスポンス"
      properties:
        ok:
          type: boolean
        policy:
          $ref: '#/components/schemas/GovernancePolicy'

    TrustFeedbackRequest:
      type: object
      description: "信頼フィードバックリクエスト（全フィールドにデフォルト値あり）"
      properties:
        user_id:
          type: string
          nullable: true
          maxLength: 500
        score:
          type: number
          default: 0.5
          minimum: 0.0
          maximum: 1.0
          description: "フィードバックスコア（0.0〜1.0）"
        note:
          type: string
          default: ""
          maxLength: 10000
          description: "フィードバックメモ"
        source:
          type: string
          default: "manual"
          maxLength: 200
          description: "フィードバック元"

    TrustLog:
      type: object
      required: [request_id, created_at, sources, critics, checks, approver]
      properties:
        request_id:
          type: string
        created_at:
          type: string
          format: date-time
        sources:
          type: array
          items:
            type: string
        critics:
          type: array
          items:
            type: string
        checks:
          type: array
          items:
            type: string
        approver:
          type: string
          default: "system"
        fuji:
          $ref: '#/components/schemas/FujiDecision'
          nullable: true
        sha256:
          type: string
          nullable: true
          description: "このエントリ自身のSHA-256ハッシュ"
        sha256_prev:
          type: string
          nullable: true
          description: "チェーン用ハッシュ（前エントリのsha256）"
        query:
          type: string
          nullable: true
          description: "元のユーザークエリテキスト（パイプライン監査エントリに付与）"
        gate_status:
          type: string
          nullable: true
          description: "FUJIゲートの判定ステータス（allow/modify/rejected/block/abstain）"
        gate_risk:
          type: number
          nullable: true
          description: "ゲートのリスクスコア"

    DecideResponse:
      type: object
      properties:
        ok:
          type: boolean
          description: "レスポンス成否フラグ"
        error:
          type: string
          nullable: true
          description: "エラー詳細（ok=falseの場合に設定）"
        request_id:
          type: string
        version:
          type: string
        chosen:
          type: object
          additionalProperties: true
          description: "選択されたアクションと理由（構造は可変。action/rationale/uncertaintyを含むことが多い）"
          properties:
            action:
              type: string
            rationale:
              type: string
            uncertainty:
              type: number
        options:
          type: array
          items:
            $ref: '#/components/schemas/Alt'
          description: "候補選択肢（後方互換フィールド、alternativesと同値に正規化）"
        alternatives:
          type: array
          items:
            $ref: '#/components/schemas/Alt'
          description: "候補選択肢（canonicalフィールド）"
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/EvidenceItem'
        critique:
          type: array
          items:
            $ref: '#/components/schemas/CritiqueItem'
        debate:
          type: array
          items:
            $ref: '#/components/schemas/DebateView'
        telos_score:
          type: number
        fuji:
          type: object
          additionalProperties: true
        trust_log:
          $ref: '#/components/schemas/TrustLog'
          nullable: true
        rsi_note:
          type: object
          nullable: true
          additionalProperties: true
          description: "RSI関連メタ情報（オブジェクト形式）"
        decision_status:
          type: string
          enum: ["allow", "modify", "rejected", "block", "abstain"]
        rejection_reason:
          type: string
          nullable: true
        values:
          $ref: '#/components/schemas/ValuesOut'
          nullable: true
        gate:
          $ref: '#/components/schemas/GateOut'
        extras:
          type: object
          additionalProperties: true
        meta:
          type: object
          additionalProperties: true
        persona:
          $ref: '#/components/schemas/PersonaState'
        plan:
          type: object
          nullable: true
          additionalProperties: true
        planner:
          type: object
          nullable: true
          additionalProperties: true
        reason:
          nullable: true
        evo:
          $ref: '#/components/schemas/EvoTips'
          nullable: true
        memory_citations:
          type: array
          items: {}
        memory_used_count:
          type: integer
        ai_disclosure:
          type: string
        regulation_notice:
          type: string
        affected_parties_notice:
          type: object
          nullable: true
          additionalProperties: true
          description: "高リスクAI決定で第三者に影響する場合の通知レコード"
        query:
          type: string
          nullable: true
          description: "監査・再現用に付与された元のユーザークエリテキスト"
        pipeline_steps:
          type: array
          nullable: true
          items:
            type: string
          description: "オーケストレーターが解決した動的パイプラインステップ（EU AI Act準拠）"
        deterministic_replay:
          type: object
          nullable: true
          additionalProperties: true
          description: "決定の決定論的再現に必要なスナップショット"

    DecideRequest:
      type: object
      description: "意思決定リクエスト（全フィールドにデフォルト値あり、alternatives/options互換）"
      properties:
        query:
          type: string
          default: ""
          maxLength: 10000
          description: "ユーザ要求/問題文（context.queryの代替）"
        context:
          oneOf:
            - $ref: '#/components/schemas/Context'
            - type: object
              additionalProperties: true
          default: {}
          description: "コンテキスト情報（省略可、デフォルト空dict）"
        alternatives:
          type: array
          items:
            $ref: '#/components/schemas/Option'
          description: "候補選択肢（canonicalフィールド）"
        options:
          type: array
          items:
            $ref: '#/components/schemas/Option'
          description: "候補選択肢（後方互換フィールド、alternativesを優先）"
        min_evidence:
          type: integer
          default: 1
          minimum: 0
          maximum: 100
        memory_auto_put:
          type: boolean
          default: true
        persona_evolve:
          type: boolean
          default: true

    MemoryPutRequest:
      type: object
      description: "メモリ保存リクエスト"
      properties:
        user_id:
          type: string
          nullable: true
          maxLength: 500
        key:
          type: string
          nullable: true
          maxLength: 500
        text:
          type: string
          default: ""
          maxLength: 100000
          description: "メモリ本文テキスト（最大100,000文字）"
        tags:
          type: array
          items:
            type: string
          description: "タグリスト（最大100件）"
        value:
          description: "任意のJSON値"
        kind:
          type: string
          default: "semantic"
          maxLength: 50
          description: "メモリ種別 (semantic / episodic / skills / doc / plan)"
        retention_class:
          type: string
          nullable: true
          maxLength: 50
          enum: ["short", "standard", "long", "regulated"]
          description: "保持クラス"
        meta:
          type: object
          additionalProperties: true
          description: "任意メタデータ"
        expires_at:
          type: integer
          nullable: true
          description: "有効期限（UNIXタイムスタンプ秒）"
        legal_hold:
          type: boolean
          default: false
          description: "法的保持フラグ"

    MemoryGetRequest:
      type: object
      description: "メモリ取得リクエスト"
      required: [key]
      properties:
        user_id:
          type: string
          nullable: true
          maxLength: 500
        key:
          type: string
          maxLength: 500

    MemorySearchRequest:
      type: object
      description: "メモリ検索リクエスト"
      properties:
        user_id:
          type: string
          nullable: true
          maxLength: 500
        query:
          type: string
          default: ""
          maxLength: 10000
          description: "検索クエリ（最大10,000文字）"
        k:
          type: integer
          default: 8
          minimum: 1
          maximum: 100
          description: "返却件数上限"
        min_sim:
          type: number
          default: 0.25
          minimum: 0.0
          maximum: 1.0
          description: "最小類似度スコア"
        kinds:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          nullable: true
          description: "絞り込むメモリ種別（単一または配列）"

    MemoryEraseRequest:
      type: object
      description: "メモリ消去リクエスト"
      properties:
        user_id:
          type: string
          nullable: true
          maxLength: 500
        reason:
          type: string
          default: "user_request"
          maxLength: 500
          description: "消去理由"
        actor:
          type: string
          default: "api"
          maxLength: 200
          description: "消去を行うアクター名"

security:
  - ApiKeyAuth: []

paths:
  /health:
    get:
      security: []
      summary: Health check
      responses:
        "200":
          description: OK

  /v1/decide:
    post:
      summary: Run full VERITAS decision loop
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecideRequest'
      responses:
        "200":
          description: Decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecideResponse'

  /v1/replay/{decision_id}:
    post:
      summary: Replay a persisted decision and store replay report
      parameters:
        - in: path
          name: decision_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Replay execution result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  decision_id:
                    type: string
                  replay_path:
                    type: string
                  match:
                    type: boolean
                  diff_summary:
                    type: string
                  replay_time_ms:
                    type: integer

  /v1/decision/replay/{decision_id}:
    post:
      summary: Decision replay (v2)
      parameters:
        - in: path
          name: decision_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Replay execution result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /v1/fuji/validate:
    post:
      summary: Safety/ethics validation for a candidate action
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, context]
              properties:
                action:
                  type: string
                context:
                  $ref: '#/components/schemas/Context'
      responses:
        "200":
          description: FUJI decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FujiDecision'

  /v1/memory/put:
    post:
      summary: Append to persistent memory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemoryPutRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  legacy:
                    type: object
                    properties:
                      saved:
                        type: boolean
                      key:
                        type: string
                        nullable: true
                  vector:
                    type: object
                    properties:
                      saved:
                        type: boolean
                      id:
                        type: string
                      kind:
                        type: string
                      tags:
                        type: array
                        items:
                          type: string
                  size:
                    type: integer
                  lifecycle:
                    type: object
                    properties:
                      retention_class:
                        type: string
                      expires_at:
                        type: integer
                        nullable: true
                      legal_hold:
                        type: boolean

  /v1/memory/get:
    post:
      summary: Retrieve memory by key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemoryGetRequest'
      responses:
        "200":
          description: Retrieved memory entry
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  error:
                    type: string
                    nullable: true
                  value:
                    description: "取得した値（任意のJSON）"

  /v1/memory/search:
    post:
      summary: Memory search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemorySearchRequest'
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /v1/memory/erase:
    post:
      summary: Memory erasure
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemoryEraseRequest'
      responses:
        "200":
          description: Erasure result
          content:
